<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chaos to Order — 3D Particle Simulation</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    #controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 10;
    }

    #controls button {
      padding: 8px 20px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      background: rgba(0, 0, 0, 0.5);
      color: #fff;
      font-family: monospace;
      font-size: 13px;
      cursor: pointer;
      border-radius: 4px;
      backdrop-filter: blur(6px);
      transition: background 0.2s;
    }

    #controls button:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    #timer {
      position: fixed;
      top: 20px;
      right: 24px;
      z-index: 10;
      font-family: monospace;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.5);
    }

    #labels-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 5;
      overflow: hidden;
    }

    .label-pill {
      position: absolute;
      top: 0;
      left: 0;
      padding: 5px 12px;
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 6px;
      background: rgba(0, 212, 255, 0.05);
      color: rgba(0, 212, 255, 0.9);
      font-family: monospace;
      font-size: 11px;
      letter-spacing: 1.5px;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      opacity: 0;
      transition: opacity 0.3s;
      will-change: transform, opacity;
    }

    .label-pill.visible {
      opacity: 1;
    }
  </style>
</head>

<body>

  <div id="labels-container"></div>
  <div id="timer">0.00s</div>
  <div id="controls">
    <button id="btnPlay">▶ Play</button>
    <button id="btnReset">↺ Reset</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>

    // ═══════════════════════════════════════════════════════════════
    // CONFIG — All tunable parameters
    // ═══════════════════════════════════════════════════════════════
    const CONFIG = {
      // Timing (seconds)
      CHAOS_DURATION: 23.5,
      TRANSITION_DURATION: 10.5,
      ORDER_DURATION: 10.5,
      FLAT_DURATION: 5.0,
      TOTAL_DURATION: 49.5,

      // Particles
      MAX_PARTICLES: 3000,
      SPAWN_RATE_START: 100,
      SPAWN_RATE_END: 300,
      PARTICLE_SIZE_MIN: 7.0,
      PARTICLE_SIZE_MAX: 25.0,
      PARTICLE_SIZE_ORDERED: 5.0,

      // Chaos movement (3D)
      CHAOS_SPEED_MIN: 0.3,
      CHAOS_SPEED_MAX: 0.7,
      CHAOS_DIRECTION_CHANGE_RATE: 1.5,
      SPAWN_RADIUS: 80,
      CHAOS_Y_RANGE: 120,

      // Grid on XZ plane (Y = 0)
      GRID_COLS: 25,
      GRID_ROWS: 24,
      GRID_SPACING: 18,

      // Connection lines
      LINE_MAX_DISTANCE: 88,
      LINE_OPACITY: 0.35,

      // Colors
      COLOR_CHAOS_1: new THREE.Color(0x00F2FF),
      COLOR_CHAOS_2: new THREE.Color(0x1DD6FF),
      COLOR_CHAOS_3: new THREE.Color(0x1DD6FF),
      COLOR_ORDER_1: new THREE.Color(0x00F2FF),
      COLOR_ORDER_2: new THREE.Color(0x1DD6FF),
      COLOR_ORDER_3: new THREE.Color(0x1DD6FF),

      // Glow / pulse
      CHAOS_PULSE_SPEED_MIN: 3.0,
      CHAOS_PULSE_SPEED_MAX: 17.0,
      CHAOS_PULSE_AMOUNT: 0.8,
      ORDER_PULSE_SPEED: 2.0,
      ORDER_PULSE_AMOUNT: 0.15,

      // Ordered "breathing"
      ORDER_BREATHE_SPEED: 1.2,
      ORDER_BREATHE_SIZE: 5.0,
      ORDER_BREATHE_OPACITY: 0.2,
      ORDER_BREATHE_DRIFT: 1.2,
      ORDER_BREATHE_Y_DRIFT: 0.8,
      ORDER_WAVE_SPEED: 0.8,
      ORDER_WAVE_SCALE: 0.012,
      ORDER_LINE_BREATHE: 0.25,

      // Line flicker — connections appear/disappear in ordered phase
      LINE_FLICKER_SPEED: 0.6,        // base flicker frequency
      LINE_FLICKER_LAYERS: 3,         // overlapping sine waves for organic feel
      LINE_FLICKER_THRESHOLD: 0.15,   // below this value line is hidden (0-1, lower = more visible lines)

      // Snap easing
      SNAP_EASING_POWER: 3.0,

      // Camera
      CAM_DISTANCE: 500,
      CAM_ANGLE_DEG: 25,
      CAM_FOV: 45,

      // Rotation around Y axis
      ROTATION_SPEED: 0.08,
      ROTATION_START_BLEND: 0.3,
    };

    // ═══════════════════════════════════════════════════════════════
    // Setup — Perspective camera
    // ═══════════════════════════════════════════════════════════════
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 0);
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      CONFIG.CAM_FOV,
      window.innerWidth / window.innerHeight,
      1, 2000
    );

    const camAngleRad = CONFIG.CAM_ANGLE_DEG * Math.PI / 180;
    const camY = Math.sin(camAngleRad) * CONFIG.CAM_DISTANCE;
    const camHoriz = Math.cos(camAngleRad) * CONFIG.CAM_DISTANCE;
    camera.position.set(0, camY, camHoriz);
    camera.lookAt(0, 0, 0);

    // World group — everything rotates together
    const worldGroup = new THREE.Group();
    scene.add(worldGroup);

    // ═══════════════════════════════════════════════════════════════
    // Grid positions on XZ plane (Y = 0)
    // ═══════════════════════════════════════════════════════════════
    const gridPositions = [];
    for (let r = 0; r < CONFIG.GRID_ROWS; r++) {
      for (let c = 0; c < CONFIG.GRID_COLS; c++) {
        gridPositions.push({
          x: (c - (CONFIG.GRID_COLS - 1) / 2) * CONFIG.GRID_SPACING,
          y: 0,
          z: (r - (CONFIG.GRID_ROWS - 1) / 2) * CONFIG.GRID_SPACING,
        });
      }
    }
    for (let i = gridPositions.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [gridPositions[i], gridPositions[j]] = [gridPositions[j], gridPositions[i]];
    }

    // ═══════════════════════════════════════════════════════════════
    // Geometry
    // ═══════════════════════════════════════════════════════════════
    const MAX = CONFIG.MAX_PARTICLES;

    const pointPositions = new Float32Array(MAX * 3);
    const pointColors = new Float32Array(MAX * 4);
    const pointSizes = new Float32Array(MAX);

    const pointGeometry = new THREE.BufferGeometry();
    pointGeometry.setAttribute('position', new THREE.BufferAttribute(pointPositions, 3));
    pointGeometry.setAttribute('color', new THREE.BufferAttribute(pointColors, 4));
    pointGeometry.setAttribute('size', new THREE.BufferAttribute(pointSizes, 1));

    const pointMaterial = new THREE.ShaderMaterial({
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      uniforms: {
        uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) },
      },
      vertexShader: `
    attribute float size;
    attribute vec4 color;
    varying vec4 vColor;
    uniform float uPixelRatio;
    void main() {
      vColor = color;
      vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = size * uPixelRatio * (300.0 / -mvPosition.z);
      gl_Position = projectionMatrix * mvPosition;
    }
  `,
      fragmentShader: `
    varying vec4 vColor;
    void main() {
      vec2 center = gl_PointCoord - 0.5;
      float dist = length(center);
      if (dist > 0.5) discard;
      float glow = 1.0 - smoothstep(0.0, 0.5, dist);
      glow = pow(glow, 1.5);
      gl_FragColor = vec4(vColor.rgb, vColor.a * glow);
    }
  `,
    });

    const pointsMesh = new THREE.Points(pointGeometry, pointMaterial);
    worldGroup.add(pointsMesh);

    const maxLines = MAX * 4;
    const linePositions = new Float32Array(maxLines * 2 * 3);
    const lineColors = new Float32Array(maxLines * 2 * 4);
    const lineGeometry = new THREE.BufferGeometry();
    lineGeometry.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
    lineGeometry.setAttribute('color', new THREE.BufferAttribute(lineColors, 4));

    const lineMaterial = new THREE.ShaderMaterial({
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      vertexShader: `
    attribute vec4 color;
    varying vec4 vColor;
    void main() {
      vColor = color;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
      fragmentShader: `
    varying vec4 vColor;
    void main() {
      gl_FragColor = vColor;
    }
  `,
    });

    const linesMesh = new THREE.LineSegments(lineGeometry, lineMaterial);
    worldGroup.add(linesMesh);

    // ═══════════════════════════════════════════════════════════════
    // Particle data
    // ═══════════════════════════════════════════════════════════════
    const particles = [];
    let activeCount = 0;

    function createParticle(index) {
      const angle = Math.random() * Math.PI * 2;
      const radius = Math.random() * CONFIG.SPAWN_RADIUS;
      const ySpread = (Math.random() - 0.5) * CONFIG.CHAOS_Y_RANGE;
      return {
        index,
        x: Math.cos(angle) * radius,
        y: ySpread,
        z: Math.sin(angle) * radius,
        vx: (Math.random() - 0.5) * CONFIG.CHAOS_SPEED_MAX * 2,
        vy: (Math.random() - 0.5) * CONFIG.CHAOS_SPEED_MAX * 1.2,
        vz: (Math.random() - 0.5) * CONFIG.CHAOS_SPEED_MAX * 2,
        targetX: 0, targetY: 0, targetZ: 0,
        freezeX: 0, freezeY: 0, freezeZ: 0,
        baseSize: CONFIG.PARTICLE_SIZE_MIN + Math.random() * (CONFIG.PARTICLE_SIZE_MAX - CONFIG.PARTICLE_SIZE_MIN),
        pulseSpeed: CONFIG.CHAOS_PULSE_SPEED_MIN + Math.random() * (CONFIG.CHAOS_PULSE_SPEED_MAX - CONFIG.CHAOS_PULSE_SPEED_MIN),
        pulseOffset: Math.random() * Math.PI * 2,
        colorMix: Math.random(),
        dirChangeTimer: Math.random() / CONFIG.CHAOS_DIRECTION_CHANGE_RATE,
      };
    }

    // ═══════════════════════════════════════════════════════════════
    // State
    // ═══════════════════════════════════════════════════════════════
    let animTime = 0;
    let isPlaying = false;
    let spawnAccumulator = 0;
    let currentRotation = 0;
    const timerEl = document.getElementById('timer');

    const NUM_LABELS = 50;
    const labelElements = [];
    const labelIndices = [];
    const labelsContainer = document.getElementById('labels-container');
    const labelPrefixes = ['CLU', 'SEG', 'NOD', 'SYS'];

    for (let i = 0; i < NUM_LABELS; i++) {
      const el = document.createElement('div');
      el.className = 'label-pill';
      const pre = labelPrefixes[Math.floor(Math.random() * labelPrefixes.length)];
      const hex = Math.random().toString(16).substring(2, 6).toUpperCase();
      el.textContent = `${pre}-${hex}`;
      if (labelsContainer) labelsContainer.appendChild(el);
      labelElements.push(el);
      labelIndices.push(Math.floor(Math.random() * CONFIG.MAX_PARTICLES));
    }

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, CONFIG.SNAP_EASING_POWER);
    }

    function lerpColor(c1, c2, c3, mix, t, target) {
      const chaos = new THREE.Color().copy(c1).lerp(c2, mix);
      const order = new THREE.Color().copy(CONFIG.COLOR_ORDER_1).lerp(CONFIG.COLOR_ORDER_2, mix);
      target.copy(chaos).lerp(order, t);
    }

    function reset() {
      animTime = 0;
      activeCount = 0;
      spawnAccumulator = 0;
      currentRotation = 0;
      isPlaying = false;
      particles.length = 0;
      worldGroup.rotation.y = 0;
      const camAngleRad = CONFIG.CAM_ANGLE_DEG * Math.PI / 180;
      camera.position.set(0, Math.sin(camAngleRad) * CONFIG.CAM_DISTANCE, Math.cos(camAngleRad) * CONFIG.CAM_DISTANCE);
      camera.lookAt(0, 0, 0);
      pointPositions.fill(0);
      pointColors.fill(0);
      pointSizes.fill(0);
      linePositions.fill(0);
      lineColors.fill(0);
      updateBuffers();
      timerEl.textContent = '0.00s';
      if (typeof labelElements !== 'undefined' && labelElements.length > 0) {
        for (let i = 0; i < NUM_LABELS; i++) {
          labelElements[i].classList.remove('visible');
          labelIndices[i] = Math.floor(Math.random() * CONFIG.MAX_PARTICLES);
        }
      }
    }

    function updateBuffers() {
      pointGeometry.attributes.position.needsUpdate = true;
      pointGeometry.attributes.color.needsUpdate = true;
      pointGeometry.attributes.size.needsUpdate = true;
      pointGeometry.setDrawRange(0, activeCount);
      lineGeometry.attributes.position.needsUpdate = true;
      lineGeometry.attributes.color.needsUpdate = true;
    }

    // ═══════════════════════════════════════════════════════════════
    // Main loop
    // ═══════════════════════════════════════════════════════════════
    const tmpColor = new THREE.Color();
    const tmpLabelVector = new THREE.Vector3();
    let lastTime = performance.now();

    function animate(now) {
      requestAnimationFrame(animate);

      const rawDt = (now - lastTime) / 1000;
      lastTime = now;
      const dt = Math.min(rawDt, 0.05);

      if (!isPlaying) {
        renderer.render(scene, camera);
        return;
      }

      animTime += dt;
      timerEl.textContent = animTime.toFixed(2) + 's';

      const chaosEnd = CONFIG.CHAOS_DURATION;
      const transEnd = chaosEnd + CONFIG.TRANSITION_DURATION;
      const orderEnd = transEnd + CONFIG.ORDER_DURATION;

      const inChaos = animTime < chaosEnd;
      const inTransition = animTime >= chaosEnd && animTime < transEnd;
      const inOrder = animTime >= transEnd && animTime < orderEnd;
      const inFlat = animTime >= orderEnd;

      const transT = inTransition ? (animTime - chaosEnd) / CONFIG.TRANSITION_DURATION : (inOrder || inFlat ? 1.0 : 0.0);
      const easedTransT = easeOutCubic(transT);

      const orderT = inOrder || inFlat ? Math.min((animTime - transEnd) / CONFIG.ORDER_DURATION, 1.0) : 0;
      const easedOrderT = easeOutCubic(orderT);

      const flatT = inFlat ? Math.min((animTime - orderEnd) / CONFIG.FLAT_DURATION, 1.0) : 0;
      const easedFlatT = easeOutCubic(flatT);

      const totalBlend = inChaos ? 0 : (inTransition ? easedTransT * 0.4 : 0.4 + 0.6 * easedOrderT);

      // ── Camera Animation ──
      const camAngleRad = CONFIG.CAM_ANGLE_DEG * Math.PI / 180;
      const origCamY = Math.sin(camAngleRad) * CONFIG.CAM_DISTANCE;
      const origCamZ = Math.cos(camAngleRad) * CONFIG.CAM_DISTANCE;
      const targetCamY = CONFIG.CAM_DISTANCE * 0.82;
      const targetCamZ = 0.01;

      camera.position.y = origCamY + (targetCamY - origCamY) * easedFlatT;
      camera.position.z = origCamZ + (targetCamZ - origCamZ) * easedFlatT;
      camera.lookAt(0, 0, 0);
      camera.updateMatrixWorld();

      // ── Rotation — ramps in during transition ──
      const rotBlend = inChaos ? 0 :
        (inTransition ? Math.max(0, (transT - CONFIG.ROTATION_START_BLEND) / (1 - CONFIG.ROTATION_START_BLEND)) : 1.0);
      currentRotation += CONFIG.ROTATION_SPEED * rotBlend * dt;
      worldGroup.rotation.y = currentRotation;
      worldGroup.updateMatrixWorld();

      // ── Spawn ──
      if ((inChaos || (inTransition && transT < 0.3)) && activeCount < MAX) {
        const chaosProgress = Math.min(animTime / chaosEnd, 1.0);
        const spawnRate = CONFIG.SPAWN_RATE_START + (CONFIG.SPAWN_RATE_END - CONFIG.SPAWN_RATE_START) * chaosProgress * chaosProgress;
        const spawnMult = inTransition ? Math.max(0, 1 - transT * 3) : 1;
        spawnAccumulator += spawnRate * spawnMult * dt;
        while (spawnAccumulator >= 1 && activeCount < MAX) {
          const p = createParticle(activeCount);
          const gp = gridPositions[activeCount % gridPositions.length];
          p.targetX = gp.x;
          p.targetY = gp.y;
          p.targetZ = gp.z;
          particles.push(p);
          activeCount++;
          spawnAccumulator -= 1;
        }
      }

      // ── Update particles ──
      for (let i = 0; i < activeCount; i++) {
        const p = particles[i];
        const idx3 = i * 3;
        const idx4 = i * 4;

        if (inChaos) {
          p.dirChangeTimer -= dt;
          if (p.dirChangeTimer <= 0) {
            const speed = CONFIG.CHAOS_SPEED_MIN + Math.random() * (CONFIG.CHAOS_SPEED_MAX - CONFIG.CHAOS_SPEED_MIN);
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            p.vx = Math.sin(phi) * Math.cos(theta) * speed;
            p.vy = Math.cos(phi) * speed * 0.6;
            p.vz = Math.sin(phi) * Math.sin(theta) * speed;
            p.dirChangeTimer = (0.3 + Math.random() * 0.7) / CONFIG.CHAOS_DIRECTION_CHANGE_RATE;
          }

          const expandFactor = 1 + (animTime / chaosEnd) * 5;
          p.x += p.vx * dt * 60 * expandFactor;
          p.y += p.vy * dt * 60 * expandFactor;
          p.z += p.vz * dt * 60 * expandFactor;

          const bound = 350;
          const yBound = 200;
          if (p.x > bound) p.x = -bound + Math.random() * 40;
          if (p.x < -bound) p.x = bound - Math.random() * 40;
          if (p.z > bound) p.z = -bound + Math.random() * 40;
          if (p.z < -bound) p.z = bound - Math.random() * 40;
          if (p.y > yBound) p.y = -yBound + Math.random() * 20;
          if (p.y < -yBound) p.y = yBound - Math.random() * 20;

          p.freezeX = p.x; p.freezeY = p.y; p.freezeZ = p.z;

          const pulse = Math.sin(animTime * p.pulseSpeed + p.pulseOffset);
          const opacity = 0.5 + CONFIG.CHAOS_PULSE_AMOUNT * pulse;
          lerpColor(CONFIG.COLOR_CHAOS_1, CONFIG.COLOR_CHAOS_2, CONFIG.COLOR_ORDER_1, p.colorMix, 0, tmpColor);

          pointPositions[idx3] = p.x;
          pointPositions[idx3 + 1] = p.y;
          pointPositions[idx3 + 2] = p.z;
          pointColors[idx4] = tmpColor.r;
          pointColors[idx4 + 1] = tmpColor.g;
          pointColors[idx4 + 2] = tmpColor.b;
          pointColors[idx4 + 3] = Math.max(0, opacity);
          pointSizes[i] = p.baseSize * (0.8 + 0.4 * Math.abs(pulse));

        } else if (inTransition) {
          const decel = 1.0 - easedTransT;
          p.x += p.vx * dt * 60 * decel;
          p.y += p.vy * dt * 60 * decel;
          p.z += p.vz * dt * 60 * decel;
          p.freezeX = p.x; p.freezeY = p.y; p.freezeZ = p.z;

          const chaosPulse = Math.sin(animTime * p.pulseSpeed + p.pulseOffset);
          const calmPulse = Math.sin(animTime * CONFIG.ORDER_BREATHE_SPEED + p.pulseOffset);
          const pulse = chaosPulse * (1 - easedTransT) + calmPulse * easedTransT;
          const chaosOpacity = 0.5 + CONFIG.CHAOS_PULSE_AMOUNT * chaosPulse;
          const calmOpacity = 0.75 + 0.15 * calmPulse;
          const opacity = chaosOpacity * (1 - easedTransT) + calmOpacity * easedTransT;

          lerpColor(CONFIG.COLOR_CHAOS_1, CONFIG.COLOR_CHAOS_2, CONFIG.COLOR_ORDER_1, p.colorMix, totalBlend, tmpColor);

          pointPositions[idx3] = p.x;
          pointPositions[idx3 + 1] = p.y;
          pointPositions[idx3 + 2] = p.z;
          pointColors[idx4] = tmpColor.r;
          pointColors[idx4 + 1] = tmpColor.g;
          pointColors[idx4 + 2] = tmpColor.b;
          pointColors[idx4 + 3] = Math.max(0, opacity);
          pointSizes[i] = p.baseSize * (0.9 + 0.2 * Math.abs(pulse));

        } else if (inOrder || inFlat) {
          // Snap to XZ plane (Y → 0)
          const baseX = p.freezeX + (p.targetX - p.freezeX) * easedOrderT;
          const baseY = p.freezeY + (p.targetY - p.freezeY) * easedOrderT;
          const baseZ = p.freezeZ + (p.targetZ - p.freezeZ) * easedOrderT;

          // Breathing wave
          const wave = Math.sin(
            animTime * CONFIG.ORDER_WAVE_SPEED +
            p.targetX * CONFIG.ORDER_WAVE_SCALE +
            p.targetZ * CONFIG.ORDER_WAVE_SCALE * 0.7
          );
          const driftAmt = CONFIG.ORDER_BREATHE_DRIFT * easedOrderT;
          const driftX = Math.sin(animTime * CONFIG.ORDER_BREATHE_SPEED * 0.7 + p.pulseOffset) * driftAmt * wave;
          const driftZ = Math.cos(animTime * CONFIG.ORDER_BREATHE_SPEED * 0.9 + p.pulseOffset * 1.3) * driftAmt * wave;
          const driftY = Math.sin(animTime * CONFIG.ORDER_BREATHE_SPEED + p.pulseOffset * 0.8) * CONFIG.ORDER_BREATHE_Y_DRIFT * wave * easedOrderT;

          p.x = baseX + driftX;
          p.y = baseY + driftY;
          p.z = baseZ + driftZ;

          const breathe = Math.sin(
            animTime * CONFIG.ORDER_BREATHE_SPEED +
            p.targetX * CONFIG.ORDER_WAVE_SCALE * 2 +
            p.targetZ * CONFIG.ORDER_WAVE_SCALE * 1.5
          );
          const opacity = 0.75 + CONFIG.ORDER_BREATHE_OPACITY * breathe * easedOrderT;
          const targetSize = CONFIG.PARTICLE_SIZE_ORDERED + CONFIG.ORDER_BREATHE_SIZE * breathe * easedOrderT;
          const currentSize = p.baseSize + (targetSize - p.baseSize) * easedOrderT;

          lerpColor(CONFIG.COLOR_CHAOS_1, CONFIG.COLOR_CHAOS_2, CONFIG.COLOR_ORDER_1, p.colorMix, totalBlend, tmpColor);

          pointPositions[idx3] = p.x;
          pointPositions[idx3 + 1] = p.y;
          pointPositions[idx3 + 2] = p.z;
          pointColors[idx4] = tmpColor.r;
          pointColors[idx4 + 1] = tmpColor.g;
          pointColors[idx4 + 2] = tmpColor.b;
          pointColors[idx4 + 3] = Math.max(0, opacity);
          pointSizes[i] = Math.max(1, currentSize);
        }
      }

      // ── Connection lines ──
      let lineVertexCount = 0;
      const showLines = (inTransition && easedTransT > 0.6) || inOrder || inFlat;
      if (showLines) {
        const maxDist = CONFIG.LINE_MAX_DISTANCE * (inTransition ? 2.5 : 1.0 + (1.0 - easedOrderT) * 1.0);
        const maxDistSq = maxDist * maxDist;

        let lineOpacity;
        if (inTransition) {
          lineOpacity = CONFIG.LINE_OPACITY * (easedTransT - 0.6) * 2.5 * 0.3;
        } else {
          const lineBreathe = Math.sin(animTime * CONFIG.ORDER_BREATHE_SPEED * 0.8);
          lineOpacity = CONFIG.LINE_OPACITY * (0.5 + 0.5 * easedOrderT) * (1 + CONFIG.ORDER_LINE_BREATHE * lineBreathe);
        }

        for (let i = 0; i < activeCount && lineVertexCount < maxLines * 2; i++) {
          const pi = particles[i];
          for (let j = i + 1; j < activeCount && lineVertexCount < maxLines * 2; j++) {
            const pj = particles[j];
            const dx = pi.x - pj.x;
            const dy = pi.y - pj.y;
            const dz = pi.z - pj.z;
            const distSq = dx * dx + dy * dy + dz * dz;
            if (distSq < maxDistSq) {
              const dist = Math.sqrt(distSq);
              const fade = 1 - dist / maxDist;
              let alpha = lineOpacity * fade;

              // Per-connection flicker after grid is mostly settled
              if ((inOrder || inFlat) && easedOrderT > 0.7) {
                const flickerBlend = Math.min((easedOrderT - 0.7) / 0.3, 1.0);
                // Hash-like seed from particle indices for unique rhythm per connection
                const seed1 = (i * 73 + j * 137) % 1000 / 1000;
                const seed2 = (i * 31 + j * 97) % 1000 / 1000;
                const seed3 = (i * 53 + j * 113) % 1000 / 1000;
                // Layered sine waves at different frequencies for organic feel
                const f = CONFIG.LINE_FLICKER_SPEED;
                const flicker1 = Math.sin(animTime * f * (0.8 + seed1 * 0.8) + seed1 * 6.28);
                const flicker2 = Math.sin(animTime * f * (1.3 + seed2 * 1.2) + seed2 * 6.28);
                const flicker3 = Math.sin(animTime * f * (0.4 + seed3 * 0.5) + seed3 * 6.28);
                const combined = (flicker1 * 0.5 + flicker2 * 0.3 + flicker3 * 0.2);
                // Remap: below threshold → fade out, above → visible
                const thresh = CONFIG.LINE_FLICKER_THRESHOLD;
                const visibility = Math.max(0, (combined - (-1 + thresh * 2)) / (2 - thresh * 2));
                const smoothVis = visibility * visibility * (3 - 2 * visibility); // smoothstep
                alpha *= (1 - flickerBlend) + flickerBlend * smoothVis;
              }

              const mix = (pi.colorMix + pj.colorMix) * 0.5;
              const chaosC = new THREE.Color().copy(CONFIG.COLOR_CHAOS_1).lerp(CONFIG.COLOR_CHAOS_2, mix);
              const orderC = new THREE.Color().copy(CONFIG.COLOR_ORDER_1).lerp(CONFIG.COLOR_ORDER_2, mix);
              tmpColor.copy(chaosC).lerp(orderC, totalBlend);

              const vi = lineVertexCount * 3;
              const ci = lineVertexCount * 4;
              linePositions[vi] = pi.x;
              linePositions[vi + 1] = pi.y;
              linePositions[vi + 2] = pi.z;
              lineColors[ci] = tmpColor.r;
              lineColors[ci + 1] = tmpColor.g;
              lineColors[ci + 2] = tmpColor.b;
              lineColors[ci + 3] = alpha;
              lineVertexCount++;

              const vi2 = lineVertexCount * 3;
              const ci2 = lineVertexCount * 4;
              linePositions[vi2] = pj.x;
              linePositions[vi2 + 1] = pj.y;
              linePositions[vi2 + 2] = pj.z;
              lineColors[ci2] = tmpColor.r;
              lineColors[ci2 + 1] = tmpColor.g;
              lineColors[ci2 + 2] = tmpColor.b;
              lineColors[ci2 + 3] = alpha;
              lineVertexCount++;
            }
          }
        }
      }
      lineGeometry.setDrawRange(0, lineVertexCount);

      updateBuffers();

      // ── Labels Position Update ──
      for (let i = 0; i < NUM_LABELS; i++) {
        const pIdx = labelIndices[i];
        if (pIdx < activeCount) {
          const p = particles[pIdx];
          tmpLabelVector.set(p.x, p.y, p.z);
          tmpLabelVector.applyMatrix4(worldGroup.matrixWorld);
          tmpLabelVector.project(camera);

          if (tmpLabelVector.z < 1 && tmpLabelVector.z > -1) {
            const x = (tmpLabelVector.x * 0.5 + 0.5) * window.innerWidth;
            const y = -(tmpLabelVector.y * 0.5 - 0.5) * window.innerHeight;
            labelElements[i].style.transform = `translate(-50%, -50%) translate(${x}px, ${y - 30}px)`;
            labelElements[i].classList.add('visible');
          } else {
            labelElements[i].classList.remove('visible');
          }
        } else {
          labelElements[i].classList.remove('visible');
        }
      }

      renderer.render(scene, camera);
    }

    requestAnimationFrame(animate);

    // ═══════════════════════════════════════════════════════════════
    // Controls
    // ═══════════════════════════════════════════════════════════════
    document.getElementById('btnPlay').addEventListener('click', () => {
      if (animTime >= CONFIG.TOTAL_DURATION) reset();
      isPlaying = true;
    });
    document.getElementById('btnReset').addEventListener('click', () => reset());

    // ═══════════════════════════════════════════════════════════════
    // Resize
    // ═══════════════════════════════════════════════════════════════
    window.addEventListener('resize', () => {
      const w = window.innerWidth;
      const h = window.innerHeight;
      renderer.setSize(w, h);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      pointMaterial.uniforms.uPixelRatio.value = Math.min(window.devicePixelRatio, 2);
    });

    reset();
  </script>
</body>

</html>
