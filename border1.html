<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Border</title>
 
</head>
<body>
<div style="
  position: relative;
  width: 100%;
  padding: 16px;
  box-sizing: border-box;
">
  <!-- SVG рамка -->
  <svg
    width="100%"
    height="100%"
    preserveAspectRatio="none"
    style="
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      pointer-events:none;
    "
  >
    <rect
      x="0" y="0"
      width="100%" height="100%"
      rx="4" ry="4"
      fill="var(--red-50, #FDE9EE)"
      stroke="var(--red-400, #EC5274)"
      stroke-width="1"
      stroke-dasharray="10 5"
      vector-effect="non-scaling-stroke"
    />
  </svg>

  <!-- Контент -->
  <div style="
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  ">
    Scalable rectangle with a dotted line that spans the entire width
  </div>
</div>
</body>
</html>
