<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Categorization Evaluation Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="report.css" />
</head>
<body>
  <section class="report">

    <!-- Header -->
    <div class="report__header animate-header">
      <div class="report__header-title">
        <h1 class="report__title">Categorization Evaluation</h1>
        <p class="report__subtitle">Categorization Agent Performance Analysis</p>
      </div>
      <div class="report__run-badge">
        <span>Run ID: 20260131_171151 | 31/01/2026</span>
      </div>
    </div>

    <!-- Key Metrics Row 1 -->
    <div class="report__kpis">
      <div class="kpi animate-kpi" style="--kpi-index: 0;">
        <span class="kpi__label">Models Evaluated</span>
        <span class="kpi__value">5</span>
      </div>
      <div class="kpi animate-kpi" style="--kpi-index: 1;">
        <span class="kpi__label">Total Test Cases</span>
        <span class="kpi__value">10</span>
      </div>
      <div class="kpi animate-kpi" style="--kpi-index: 2;">
        <span class="kpi__label">Avg. Success Rate</span>
        <span class="kpi__value">100.0%</span>
      </div>
      <div class="kpi animate-kpi" style="--kpi-index: 3;">
        <span class="kpi__label">Total Run Cost</span>
        <span class="kpi__value">$0.0828</span>
      </div>
      <div class="kpi animate-kpi" style="--kpi-index: 4;">
        <span class="kpi__label">Input Tokens</span>
        <span class="kpi__value">64,091</span>
      </div>
      <div class="kpi animate-kpi" style="--kpi-index: 5;">
        <span class="kpi__label">Total Cached Read</span>
        <span class="kpi__value">0</span>
      </div>
      <div class="kpi animate-kpi" style="--kpi-index: 6;">
        <span class="kpi__label">Output Tokens</span>
        <span class="kpi__value">4,949</span>
      </div>
      <div class="kpi animate-kpi" style="--kpi-index: 7;">
        <span class="kpi__label">Total Duration</span>
        <span class="kpi__value">85.5s</span>
      </div>
    </div>

    <!-- Charts -->
    <div class="report__charts">
      <div class="chart animate-chart" style="--chart-index: 0;"></div>
      <div class="chart animate-chart" style="--chart-index: 1;"></div>
    </div>

  </section>
</body>
</html>
