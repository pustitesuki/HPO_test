<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clinical Knowledge Graph — Pipeline</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
      font-family: 'Space Grotesk', sans-serif;
    }

    canvas {
      display: block;
      position: relative;
      z-index: 1;
    }

    .barrier-panel {
      position: fixed;
      pointer-events: none;
      z-index: 9;
      border: 1px solid #00D4FF;
      box-shadow: 0 20px 30px rgba(0, 0, 0, 0.25);
      overflow: hidden;
      background: linear-gradient(177deg,
          rgba(81, 221, 247, 0.42) 29.73%,
          rgba(255, 255, 255, 0.52) 111.04%);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .barrier-panel__label {
      position: absolute;
      right: 18px;
      bottom: 22px;
      color: #000;
      font-family: "Space Grotesk", sans-serif;
      font-size: 32px;
      font-weight: 300;
      line-height: normal;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      transform-origin: center;
    }

    .hint {
      position: fixed;
      bottom: 20px;
      right: 26px;
      font-size: 9px;
      color: rgba(0, 170, 200, 0.35);
      pointer-events: none;
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: 0.1em;
    }
  </style>
</head>

<body>
  <canvas id="c"></canvas>
  <div id="barrier-panel" class="barrier-panel">
    <span class="barrier-panel__label">Knowledge extraction</span>
  </div>
  <div class="hint">CLINICAL KNOWLEDGE GRAPH</div>
  <script>
    'use strict';

    // ═══════════════════════════════════════════════════════════════════════════
    // ALL SETTINGS — tweak everything here
    // ═══════════════════════════════════════════════════════════════════════════
    const CFG = {

      // ── Typography (all labels) — requires Space Grotesk <link> in <head> ───────
      FONT_FAMILY: 'Space Grotesk',
      FONT_PILL_CHIP: '200 12px "Space Grotesk", sans-serif',
      FONT_KG_LABEL: '200 12px "Space Grotesk", sans-serif', // all labels on knowledge graph (Light)
      FONT_BARRIER: '200 13px "Space Grotesk", sans-serif',
      FONT_ZONE_TITLE: '200 32px "Space Grotesk", sans-serif', // Unstructured data / Knowledge graph
      ZONE_TITLE_COLOR: '#00C2E7',
      ZONE_TITLE_GAP: 14,         // px above conveyor band top
      FONT_HINT: '12px',
      SECTION_LABEL_INSET: 24,    // px from zone left/right edge
      CONVEYOR_ZONE_LABEL: 'Unstructured data',
      KG_ZONE_LABEL: 'Knowledge graph',

      // ── Label color (single blue for every label) ─────────────────────────────
      LABEL_RGB: [0, 0, 0],
      LABEL_BG_OPACITY: 1,      // white pill fill (30%)
      LABEL_GAP_ABOVE: 6,        // px between content top and pill bottom
      LABEL_PILL_PAD_X: 18,
      LABEL_PILL_PAD_Y: 18,
      LABEL_PILL_RADIUS: 2,
      LABEL_STROKE_OP: 0.35,

      // ── Layout ────────────────────────────────────────────────────────────────
      BARRIER_X_FRAC: 0.5,         // barrier line x as fraction of screen width
      NET_CX_FRAC: 0.695,          // network center x
      NET_CY_FRAC: 0.500,          // network center y
      CONVEYOR_HEIGHT_FRAC: 0.65,  // conveyor + barrier height as fraction of screen height (centered)
      CONVEYOR_ROWS: 16,           // number of rows (stack is centered, not stretched)
      // vertical pitch between row tops = GRID_CELL + GRID_GAP

      // ── Pixel Grid (left zone) ────────────────────────────────────────────────
      GRID_CELL: 32,     // square size px
      GRID_GAP: 8,       // gap between squares px (also row/column pitch gap)
      GRID_DENSITY: 0,    // repeating belt (0 = off). Use with CONVEYOR_SPAWN_RATE or alone
      GRID_PATTERN_COLS: 72,    // pattern repeats every N columns (only if GRID_DENSITY > 0)
      GRID_CHIP_PROB: 0.3,  // 0–1: share of squares that get a chip label
      // Conveyor: 1:1 scroll to barrier, dense stack via resolveOverlaps (STEP)
      CONVEYOR_LEFT_FAST: 2.5,          // x<0: fast entry from left edge
      CONVEYOR_SCROLL_MUL: 5.0,         // logical scroll multiplier
      CONVEYOR_QUEUE_HOLD_SEC: 7.4,     // dwell at barrier before despawn (builds queue)
      CONVEYOR_BARRIER_PAD: 6,         // min px from barrier line to square edge
      CONVEYOR_LABEL_MARGIN: 24,       // no chip labels closer than this to barrier
      GRID_ROW_SPEED_MIN: -1.5,        // base logical px/frame per row (negative = toward barrier)
      GRID_ROW_SPEED_MAX: -3.5,
      CONVEYOR_SPAWN_RATE: 0.9,         // new squares/sec per row (dynamic spawn). 0 = no spawn
      //   Opacity: base ± pulse amplitude (clamped 0.04–0.94)
      GRID_OPACITY_BASE: 0.75,
      GRID_OPACITY_AMP: 0.52,
      GRID_PULSE_SPEED: 0.00, // phase increment per frame per column
      GRID_FADE_ZONE: 0,     // 0 = keep squares visible in queue at barrier
      GRID_COLOR: [0, 215, 255], // [r,g,b] of the squares

      // ── Data Streams (brrier → network) ─────────────────────────────────────
      STREAM_COUNT: 66,    // number of animated lines
      STREAM_PATH_ALPHA: 0.52,  // static path line opacity
      STREAM_PATH_WIDTH: 0.65,  // path line width
      STREAM_DOT_R: 2.6,   // moving dot radius
      STREAM_DOT_ALPHA: 0.95,  // moving dot opacity
      STREAM_GLOW_R: 7.0,   // glow circle radius around dot
      STREAM_GLOW_ALPHA: 0.28,  // glow opacity
      STREAM_SPEED_MIN: 0.0030,// min t-increment per frame
      STREAM_SPEED_MAX: 0.0072,// max t-increment per frame

      // ── Barrier (rounded rect, centered on BARRIER_X_FRAC) ───────────────────
      BARRIER_RECT_W: 126,
      BARRIER_RECT_RADIUS: 16,
      BARRIER_BORDER: '#4AE0FF',
      BARRIER_GRAD_ANGLE: 177,       // CSS deg
      BARRIER_GRAD_C1: '#51DDF7',
      BARRIER_GRAD_C2: '#FFFFFF',
      BARRIER_GRAD_STOP: 0.2973,
      BARRIER_BG_OPACITY: 0.2,       // glass fill strength (HTML panel)
      BARRIER_BACKDROP_BLUR: 8,      // px — backdrop-filter blur
      BARRIER_SHADOW_BLUR: 30,
      BARRIER_SHADOW_Y: 20,
      BARRIER_SHADOW_OP: 0.25,
      BARRIER_LABEL: 'Knowledge extraction',
      FONT_BARRIER_RECT: '300 32px "Space Grotesk", sans-serif',
      BARRIER_LABEL_INSET_X: 18,  // px from rect right edge
      BARRIER_LABEL_INSET_Y: 22,  // px from rect bottom edge
      BARRIER_LABEL_OP: 1,
      BARRIER_Z_INDEX: 9,           // draw order: panel above conveyor (see Z_LAYER)

      // ── Network physics ───────────────────────────────────────────────────────
      ALPHA_DECAY: 0.0018,
      ALPHA_MIN: 0.008,
      PHYSICS_SETTLED_EPS: 0.015, // stop netTick when alphaSim below this
      INIT_VEL: 1.5,
      GRAVITY_MAIN: 0.005,
      GRAVITY_MAIN_BASE: 0.60,
      GRAVITY_MAIN_R: 0.025,
      GRAVITY_PERI: 0.0018,
      REPULSION_RANGE: 230,
      REPULSION_R_MUL: 5,
      REPULSION_BASE: 180,
      COLLISION_GAP: 1.5,
      COLLISION_RESP: 0.45,
      SPRING_REST_BASE: 18,
      SPRING_REST_R: 0.85,
      SPRING_K: 0.022,
      DAMPING: 0.44,

      // ── Network rendering ─────────────────────────────────────────────────────
      EDGE_MAIN_ALPHA: 0.12,
      EDGE_MAIN_ALPHA_R: 0.0025,
      EDGE_PERI_ALPHA: 0.36,
      EDGE_PERI_ALPHA_R: 0.012,
      EDGE_MAIN_W: 0.55,
      EDGE_PERI_W: 0.75,
      EDGE_CURVE_F: 0.82,
      NODE_GLOW_THRESH: 7,
      NODE_GLOW_R: 2.8,
      NODE_GLOW_INNER: 0.35,
      NODE_GLOW_A_MAIN: 0.10,
      NODE_GLOW_A_PERI: 0.16,
      NODE_A_BASE: 0.42,
      NODE_A_R: 0.009,
      NODE_A_MAX: 0.92,
      NODE_A_PERI: 0.82,
      NODE_A_SPREAD: 0.45,
      BREATHE_AMP: 0.25,
      BREATHE_SPEED: 1.05,
      BREATHE_THRESH: 0.48,
      NET_FADE_START: 0.70,  // alpha_sim at which network starts fading in
      NET_FADE_END: 0.45,  // alpha_sim at which network is fully visible
      KG_BUILD_DELAY_SEC: 2.8, // wait before graph + streams appear (conveyor first)
      KG_BUILD_RAMP_SEC: 2.2,  // fade-in length after delay

      // ── Network node counts ───────────────────────────────────────────────────
      SH_COUNT: 16, SH_R_MIN: 22, SH_R_RANGE: 11, SH_START_R: 4,
      PH_COUNT: 200, PH_R_MIN: 5, PH_R_RANGE: 9, PH_START_R: 32,
      PH_SH_E2: 0.50, PH_PH_E1: 0.55, PH_PH_E2: 0.28,
      SEC_COUNT: 450, SEC_R_MIN: 3.5, SEC_R_RANGE: 5.5, SEC_START_R: 88,
      SEC_E1: 0.45, SEC_E2: 0.15,
      ML_COUNT: 140, ML_R_MIN: 1.0, ML_R_RANGE: 3.2, ML_START_R: 110,
      ML_SEC_P: 0.72, ML_ML_P: 0.22,
      PERI_COUNT: 12,
    };

    // ═══════════════════════════════════════════════════════════════════════════
    // Setup
    // ═══════════════════════════════════════════════════════════════════════════
    let W = window.innerWidth, H = window.innerHeight;
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const barrierPanelEl = document.getElementById('barrier-panel');
    const barrierLabelEl = barrierPanelEl.querySelector('.barrier-panel__label');
    canvas.width = W; canvas.height = H;

    const BX = () => W * CFG.BARRIER_X_FRAC;
    const barrierLeft = (bx) => bx - CFG.BARRIER_RECT_W * 0.5;
    const barrierRight = (bx) => bx + CFG.BARRIER_RECT_W * 0.5;

    // Per-frame layout cache (avoid repeated W/H math in hot paths)
    const frame = {
      bx: 0, barrierRight: 0, barrierLeft: 0, maxSqX: 0, invBx: 1,
      ncx: 0, ncy: 0, gTop: 0, gBot: 0, maxLblX: 0,
    };
    function beginFrame() {
      const bx = W * CFG.BARRIER_X_FRAC;
      const gTop = (H - H * CFG.CONVEYOR_HEIGHT_FRAC) * 0.5;
      const gBot = gTop + H * CFG.CONVEYOR_HEIGHT_FRAC;
      frame.bx = bx;
      frame.barrierRight = bx + CFG.BARRIER_RECT_W * 0.5;
      frame.barrierLeft = bx - CFG.BARRIER_RECT_W * 0.5;
      frame.maxSqX = frame.barrierLeft - CFG.CONVEYOR_BARRIER_PAD - CELL;
      frame.maxX = frame.maxSqX;
      frame.invBx = 1 / bx;
      frame.bxToMaxX = frame.maxSqX * frame.invBx;
      frame.ncx = W * CFG.NET_CX_FRAC;
      frame.ncy = H * CFG.NET_CY_FRAC;
      frame.gTop = gTop;
      frame.gBot = gBot;
      frame.maxLblX = bx - CFG.CONVEYOR_LABEL_MARGIN;
    }

    const Z_LAYER = {
      BG: 0,
      NETWORK: 1,
      STREAMS: 2,
      CONVEYOR: 3,
      BARRIER: CFG.BARRIER_Z_INDEX,
      ZONE_TITLES: 10,
    };

    const physBuckets = new Map();
    const NCX     = () => W * CFG.NET_CX_FRAC;
    const NCY     = () => H * CFG.NET_CY_FRAC;
    const GRID_H  = () => H * CFG.CONVEYOR_HEIGHT_FRAC;
    const GRID_TOP = () => (H - GRID_H()) / 2;
    const GRID_BOT = () => GRID_TOP() + GRID_H();

    function conveyorStackTop() {
      const numRows = Math.max(1, Math.floor(CFG.CONVEYOR_ROWS));
      const rowStep = CFG.GRID_CELL + CFG.GRID_GAP;
      const blockH = CFG.GRID_CELL + (numRows - 1) * rowStep;
      return GRID_TOP() + (GRID_H() - blockH) * 0.5;
    }

    function drawZoneTitle(text, zoneEdgeX, align) {
      ctx.save();
      ctx.font = CFG.FONT_ZONE_TITLE;
      ctx.fillStyle = CFG.ZONE_TITLE_COLOR;
      ctx.textBaseline = 'bottom';
      const y = GRID_TOP() - CFG.ZONE_TITLE_GAP;
      if (align === 'right') {
        ctx.textAlign = 'right';
        ctx.fillText(text, zoneEdgeX - CFG.SECTION_LABEL_INSET, y);
      } else {
        ctx.textAlign = 'left';
        ctx.fillText(text, zoneEdgeX + CFG.SECTION_LABEL_INSET, y);
      }
      ctx.restore();
    }

    function drawSectionLabel(text, zoneLeftX) {
      drawZoneTitle(text, zoneLeftX, 'left');
    }

    function drawSectionLabelRight(text, zoneRightX) {
      drawZoneTitle(text, zoneRightX, 'right');
    }

    // ─── Helpers ─────────────────────────────────────────────────────────────────
    function rrect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y, x + w, y + r, r);
      ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
      ctx.lineTo(x + r, y + h); ctx.arcTo(x, y + h, x, y + h - r, r);
      ctx.lineTo(x, y + r); ctx.arcTo(x, y, x + r, y, r);
      ctx.closePath();
    }

    const [LR, LG, LB] = CFG.LABEL_RGB;

    // Pill sits above contentTopY (top edge of square / node / band)
    function drawLabelPill(text, anchorX, contentTopY, op, font, align = 'center') {
      if (op < 0.04) return;
      ctx.save();
      ctx.globalAlpha = op;
      ctx.font = font;
      const tw = ctx.measureText(text).width;
      const pw = tw + CFG.LABEL_PILL_PAD_X;
      const ph = CFG.LABEL_PILL_PAD_Y;
      const pr = CFG.LABEL_PILL_RADIUS;
      const pillBottom = contentTopY - CFG.LABEL_GAP_ABOVE;
      const py = pillBottom - ph;
      let px, textX;
      if (align === 'left') {
        px = anchorX;
        textX = anchorX + pw / 2;
      } else if (align === 'right') {
        px = anchorX - pw;
        textX = anchorX - pw / 2;
      } else {
        px = anchorX - pw / 2;
        textX = anchorX;
      }

      ctx.fillStyle = `rgba(255,255,255,${CFG.LABEL_BG_OPACITY})`;
      rrect(px, py, pw, ph, pr);
      ctx.fill();
      ctx.strokeStyle = `rgba(${LR},${LG},${LB},${CFG.LABEL_STROKE_OP})`;
      ctx.lineWidth = 0.8;
      rrect(px, py, pw, ph, pr);
      ctx.stroke();
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = `rgba(${LR},${LG},${LB},1)`;
      ctx.fillText(text, textX, py + ph / 2);
      ctx.restore();
    }

    function bezPt(ax, ay, bx, by, cx2, cy, dx, dy, t) {
      const u = 1 - t;
      return {
        x: u * u * u * ax + 3 * u * u * t * bx + 3 * u * t * t * cx2 + t * t * t * dx,
        y: u * u * u * ay + 3 * u * u * t * by + 3 * u * t * t * cy + t * t * t * dy
      };
    }

    // Dot-grid background pattern (drawn once)
    const dotC = document.createElement('canvas'); dotC.width = 38; dotC.height = 38;
    const dotX = dotC.getContext('2d');
    dotX.fillStyle = 'rgba(0,190,215,0.052)';
    dotX.beginPath(); dotX.arc(19, 19, 0.85, 0, Math.PI * 2); dotX.fill();
    const DOT_PAT = ctx.createPattern(dotC, 'repeat');

    // ═══════════════════════════════════════════════════════════════════════════
    // PIXEL GRID — one big continuous scrolling grid across the left zone
    // ═══════════════════════════════════════════════════════════════════════════
    const CELL = CFG.GRID_CELL;
    const GAP = CFG.GRID_GAP;
    const STEP = CELL + GAP;       // 11px
    const PCOLS = CFG.GRID_PATTERN_COLS;

    function randomChipLabel() {
      const p = CFG.GRID_CHIP_PROB;
      if (p <= 0) return null;
      if (p >= 1 || Math.random() < p) {
        return FILE_LABELS[Math.floor(Math.random() * FILE_LABELS.length)];
      }
      return null;
    }

    const FILE_LABELS = ['Guidelines', 'Medical files', 'Case files', "Doctor's notes",
      'Imaging reports', 'Discharge summaries', 'Lab results',
      'Prescriptions', 'Referrals', 'Claim forms'];

    const [GR, GG, GB] = CFG.GRID_COLOR;

    // Build row descriptors
    let gridRows = [];
    function buildGrid() {
      gridRows = [];
      const numRows = Math.max(1, Math.floor(CFG.CONVEYOR_ROWS));
      const rowStep = STEP;   // GRID_CELL + GRID_GAP
      const startY = conveyorStackTop();
      for (let r = 0; r < numRows; r++) {
        // Random per-row scroll speed (constant for that row's lifetime)
        const speed = CFG.GRID_ROW_SPEED_MIN +
          Math.random() * (CFG.GRID_ROW_SPEED_MAX - CFG.GRID_ROW_SPEED_MIN);
        const usePattern = CFG.GRID_DENSITY > 0;
        const pattern = Array.from({ length: PCOLS }, () =>
          usePattern && Math.random() < CFG.GRID_DENSITY);
        // Per-column phase (for opacity pulsing)
        const phases = Float32Array.from({ length: PCOLS }, () => Math.random() * Math.PI * 2);
        let visCount = 0;
        for (let c = 0; c < PCOLS; c++) if (pattern[c]) visCount++;
        const patW = Math.max(STEP, visCount * STEP);
        const chips = Array.from({ length: PCOLS }, (_, c) =>
          pattern[c] ? randomChipLabel() : null);
        gridRows.push({
          y: startY + r * rowStep,
          speed,
          pattern, phases, chips,
          visCount, patW,
          offset: Math.random() * patW,
          spawns: [],
        });
      }
    }
    buildGrid();

    function scrollWrap(offset, pw) {
      return ((offset % pw) + pw) % pw;
    }

    // Linear belt: logical px ≈ screen px until barrier; queue density = resolveOverlaps.
    function conveyorScreenX(logicalX) {
      if (logicalX < 0) return logicalX * CFG.CONVEYOR_LEFT_FAST;
      if (logicalX >= frame.bx) return frame.maxSqX;
      return logicalX * frame.bxToMaxX;
    }

    const overlapHeldBuf = [];
    const overlapFlyBuf = [];
    const overlapOutBuf = [];

    // Pack row: queued (oldest at barrier) then in-flight; min STEP between centers.
    function resolveOverlaps(items, maxX) {
      const n = items.length;
      if (!n) return items;
      overlapHeldBuf.length = 0;
      overlapFlyBuf.length = 0;
      for (let i = 0; i < n; i++) {
        const it = items[i];
        if (it.holdAt != null) overlapHeldBuf.push(it);
        else overlapFlyBuf.push(it);
      }
      overlapHeldBuf.sort((a, b) => a.holdAt - b.holdAt);
      overlapFlyBuf.sort((a, b) => b.logicalX - a.logicalX || a.x - b.x);
      overlapOutBuf.length = 0;
      let slotX = maxX;
      const pack = (list) => {
        for (let i = 0, len = list.length; i < len; i++) {
          const it = list[i];
          const x = Math.min(it.x, slotX);
          slotX = x - STEP;
          if (x < -CELL - STEP) continue;
          it.x = x;
          overlapOutBuf.push(it);
        }
      };
      pack(overlapHeldBuf);
      pack(overlapFlyBuf);
      overlapOutBuf.sort((a, b) => a.x - b.x);
      return overlapOutBuf;
    }

    const sqOpStyles = new Map();
    function fillStyleForOp(op) {
      const key = (op * 100 + 0.5) | 0;
      let s = sqOpStyles.get(key);
      if (!s) {
        s = `rgba(${GR},${GG},${GB},${(key / 100).toFixed(2)})`;
        sqOpStyles.set(key, s);
      }
      return s;
    }

    const rowSquaresBuf = [];
    const sqBatchByOp = new Map();

    function drawSquareBatches(squares) {
      sqBatchByOp.clear();
      for (let i = 0; i < squares.length; i++) {
        const sq = squares[i];
        const key = (sq.op * 100 + 0.5) | 0;
        let batch = sqBatchByOp.get(key);
        if (!batch) { batch = []; sqBatchByOp.set(key, batch); }
        batch.push(sq);
      }
      for (const [key, batch] of sqBatchByOp) {
        ctx.fillStyle = fillStyleForOp(key / 100);
        for (let i = 0; i < batch.length; i++) {
          const sq = batch[i];
          ctx.fillRect(sq.x, sq.y, CELL, CELL);
        }
      }
    }

    function trySpawnSquare(row, dt) {
      if (CFG.CONVEYOR_SPAWN_RATE <= 0 || dt <= 0) return;
      if (Math.random() >= 1 - Math.exp(-CFG.CONVEYOR_SPAWN_RATE * dt)) return;
      row.spawns.push({
        base: row.offset,
        chip: randomChipLabel(),
        phase: Math.random() * Math.PI * 2,
      });
    }

    const gridPulseOn = CFG.GRID_PULSE_SPEED !== 0;

    function collectConveyorSquare(row, logicalX, chip, phase, rowSquares, holdAt) {
      const x = conveyorScreenX(logicalX);
      if (x < -CELL - STEP || x > frame.maxSqX + STEP) return;
      let op = gridPulseOn
        ? Math.max(0.04, Math.min(0.94, CFG.GRID_OPACITY_BASE + CFG.GRID_OPACITY_AMP * Math.sin(phase)))
        : CFG.GRID_OPACITY_BASE;
      if (CFG.GRID_FADE_ZONE > 0) {
        const dist = frame.maxSqX - x;
        if (dist < CFG.GRID_FADE_ZONE) op *= dist / CFG.GRID_FADE_ZONE;
      }
      if (row.y + CELL < frame.gTop || row.y > frame.gBot) return;
      if (op < 0.03) return;
      rowSquares.push({ x, y: row.y, op, logicalX, chip, holdAt: holdAt ?? null });
    }

    function drawGrid(dt) {
      const bx = frame.bx;
      const gTop = frame.gTop;
      const gBot = frame.gBot;
      const repsFor = (pw) => Math.ceil(bx / pw) + 2;
      const pendingLabels = [];

      ctx.save();
      ctx.beginPath();
      ctx.rect(0, gTop, bx, gBot - gTop);
      ctx.clip();

      const maxSqX = frame.maxSqX;
      const maxLblX = frame.maxLblX;

      for (const row of gridRows) {
        if (row.y > gBot + STEP || row.y + CELL < gTop) continue;

        const rowPatW = row.patW;
        const reps = repsFor(rowPatW);
        if (!row.spawns) row.spawns = [];
        trySpawnSquare(row, dt);

        row.offset += row.speed * CFG.CONVEYOR_SCROLL_MUL;
        const scrollX = scrollWrap(row.offset, rowPatW);

        if (CFG.GRID_DENSITY > 0) {
          for (let c = 0; c < PCOLS; c++) {
            if (!row.pattern[c]) continue;
            row.phases[c] += CFG.GRID_PULSE_SPEED;
          }
        }

        rowSquaresBuf.length = 0;

        if (CFG.GRID_DENSITY > 0) {
          for (let rep = -1; rep < reps; rep++) {
            let visSlot = 0;
            for (let c = 0; c < PCOLS; c++) {
              if (!row.pattern[c]) continue;
              const logicalX = rep * rowPatW + visSlot * STEP - scrollX;
              visSlot++;
              collectConveyorSquare(row, logicalX, row.chips[c], row.phases[c], rowSquaresBuf);
            }
          }
        }

        const spawns = row.spawns;
        for (let si = 0; si < spawns.length; si++) {
          const sp = spawns[si];
          const logicalX = sp.base - row.offset;
          if (logicalX >= bx && sp.holdAt == null) sp.holdAt = animTime;
          collectConveyorSquare(row, logicalX, sp.chip, sp.phase, rowSquaresBuf, sp.holdAt);
        }

        let w = 0;
        for (let si = 0; si < spawns.length; si++) {
          const sp = spawns[si];
          const lx = sp.base - row.offset;
          const keep = sp.holdAt != null
            ? animTime - sp.holdAt < CFG.CONVEYOR_QUEUE_HOLD_SEC
            : lx > -STEP * 4 && lx < bx;
          if (keep) spawns[w++] = sp;
        }
        spawns.length = w;

        const placed = resolveOverlaps(rowSquaresBuf, maxSqX);
        drawSquareBatches(placed);
        for (let pi = 0; pi < placed.length; pi++) {
          const sq = placed[pi];
          const lblCx = sq.x + CELL * 0.5;
          if (sq.chip && sq.op > 0.35 && lblCx < maxLblX) {
            pendingLabels.push({
              text: sq.chip,
              cx: lblCx,
              contentTopY: sq.y,
              op: sq.op * 0.9,
            });
          }
        }
      }
      ctx.restore();

      for (const lbl of pendingLabels) {
        if (lbl.cx >= maxLblX) continue;
        drawLabelPill(lbl.text, lbl.cx, lbl.contentTopY, lbl.op, CFG.FONT_PILL_CHIP);
      }
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // NETWORK GRAPH — adapted from network-graph.html
    // ═══════════════════════════════════════════════════════════════════════════
    const CYA = [0, 215, 255];

    // Named hub nodes (super-hubs of the network)
    const HUB_DEF = [
      { name: 'Treatments', r: 30 },
      { name: 'Conditions', r: 24 },
      { name: 'Symptoms', r: 20 },
      { name: 'Diagnostic criteria', r: 24 },
      { name: 'Decision logic', r: 22 },
      { name: 'ACOEM', r: 23 },
      { name: 'SNOMED', r: 23 },
      { name: 'ICD', r: 24 },
      { name: 'CPT', r: 20 },
      { name: 'Protocols', r: 18 },
      { name: 'Pathology', r: 18 },
      { name: 'Genetics', r: 19 },
      { name: 'Risk Factors', r: 22 },
      { name: 'Comorbidities', r: 20 },
      { name: 'Outcomes', r: 22 },
      { name: 'Biomarkers', r: 18 },
      { name: 'Interventions', r: 18 },
      { name: 'Active Ingredients', r: 20 },
      { name: 'Drug Interactions', r: 20 },
      { name: 'Contraindications', r: 20 },
      { name: 'Mechanisms of Action', r: 22 },
      { name: 'Adverse Events', r: 20 },
      { name: 'Pharmacokinetics', r: 20 },
      { name: 'LOINC', r: 20 },
      { name: 'RxNorm', r: 20 },
      { name: 'HL7 FHIR', r: 20 },
      { name: 'MeSH', r: 20 },
      { name: 'DRG', r: 20 },
      { name: 'Phenotypes', r: 20 },
      { name: 'Gene Expressions', r: 20 },
      { name: 'Molecular Pathways', r: 22 },
      { name: 'Metabolomics', r: 20 },
      { name: 'Genomic Variants', r: 20 },
      { name: 'Lab Results', r: 20 },
      { name: 'Vital Signs', r: 20 },
      { name: 'Care Pathways', r: 20 },
      { name: 'Clinical Trials', r: 20 },
      { name: 'Social Determinants', r: 22 },
      { name: 'Immunizations', r: 20 },
      { name: 'Care Protocols', r: 20 },
      { name: 'Medical Devices', r: 20 },
    ];

    const nodes = [], edges = [];
    let nid = 0, alphaSim = 1.0;

    function mkNode(r, startR, hubName) {
      const id = nid++;
      const a = Math.random() * Math.PI * 2;
      const d = (startR || 8) * Math.pow(Math.random(), 0.5);
      nodes.push({
        id, r,
        x: NCX() + Math.cos(a) * d, y: NCY() + Math.sin(a) * d,
        vx: (Math.random() - .5) * CFG.INIT_VEL,
        vy: (Math.random() - .5) * CFG.INIT_VEL,
        fx: 0, fy: 0,
        phase: Math.random() * Math.PI * 2,
        aOff: (Math.random() - .5) * CFG.NODE_A_SPREAD,
        hubName: hubName || null, community: 0, pColor: null
      });
      return id;
    }
    function mkEdge(a, b) { edges.push([a, b, (Math.random() - .5) * CFG.EDGE_CURVE_F]); }
    function rndOf(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    // Named hub ring
    const HUB_IDS = [];
    HUB_DEF.forEach((hd, i) => {
      const id = mkNode(hd.r, i === 0 ? 2 : 5, hd.name);
      HUB_IDS.push(id);
      if (i === 0) { nodes[id].x = NCX(); nodes[id].y = NCY(); }
      else {
        const a = (i - 1) / (HUB_DEF.length - 1) * Math.PI * 2;
        nodes[id].x = NCX() + Math.cos(a) * (100 + Math.random() * 45);
        nodes[id].y = NCY() + Math.sin(a) * (82 + Math.random() * 32);
      }
    });
    for (let i = 1; i < HUB_IDS.length; i++) mkEdge(HUB_IDS[0], HUB_IDS[i]);
    for (let i = 1; i < HUB_IDS.length - 1; i++) mkEdge(HUB_IDS[i], HUB_IDS[i + 1]);
    mkEdge(HUB_IDS[HUB_IDS.length - 1], HUB_IDS[1]);
    for (let i = 1; i < HUB_IDS.length; i++) {
      if (Math.random() < 0.22) {
        const j = 1 + Math.floor(Math.random() * (HUB_IDS.length - 1));
        if (j !== i) mkEdge(HUB_IDS[i], HUB_IDS[j]);
      }
    }

    // Primary hubs
    const PH = [];
    for (let i = 0; i < CFG.PH_COUNT; i++) {
      const h = mkNode(CFG.PH_R_MIN + Math.random() * CFG.PH_R_RANGE, CFG.PH_START_R);
      PH.push(h); mkEdge(h, rndOf(HUB_IDS));
      if (Math.random() < CFG.PH_SH_E2) mkEdge(h, rndOf(HUB_IDS));
      if (PH.length > 3 && Math.random() < CFG.PH_PH_E1) mkEdge(h, rndOf(PH));
      if (PH.length > 8 && Math.random() < CFG.PH_PH_E2) mkEdge(h, rndOf(PH));
    }
    // Secondary
    const SEC = [];
    for (let i = 0; i < CFG.SEC_COUNT; i++) {
      const s = mkNode(CFG.SEC_R_MIN + Math.random() * CFG.SEC_R_RANGE, CFG.SEC_START_R);
      SEC.push(s); mkEdge(s, rndOf(PH));
      if (SEC.length > 2 && Math.random() < CFG.SEC_E1) mkEdge(s, rndOf(SEC));
      if (SEC.length > 6 && Math.random() < CFG.SEC_E2) mkEdge(s, rndOf(SEC));
    }
    // Leaves
    const ML = [];
    for (let i = 0; i < CFG.ML_COUNT; i++) {
      const l = mkNode(CFG.ML_R_MIN + Math.random() * CFG.ML_R_RANGE, CFG.ML_START_R);
      ML.push(l);
      mkEdge(l, Math.random() < CFG.ML_SEC_P ? rndOf(SEC) : rndOf(PH));
      if (ML.length > 4 && Math.random() < CFG.ML_ML_P) mkEdge(l, rndOf(ML));
    }
    // Peripheral clusters
    const PCOL_LIST = [[80, 220, 255], [90, 210, 250], [70, 225, 255], [100, 215, 245], [60, 215, 255],
    [110, 220, 250], [85, 210, 245], [120, 215, 255], [75, 225, 250], [95, 210, 255],
    [65, 215, 250], [105, 220, 245]];
    const outerPool = [...SEC.slice(-45), ...ML.slice(-65)];
    for (let ci = 0; ci < CFG.PERI_COUNT; ci++) {
      const pc = PCOL_LIST[ci];
      const bAng = (ci / CFG.PERI_COUNT) * Math.PI * 2 + (Math.random() - .5) * .5;
      const bR = 170 + Math.random() * 55;
      const cSize = 5 + Math.floor(Math.random() * 12);
      const cNds = [];
      for (let k = 0; k < cSize; k++) {
        const la = bAng + (Math.random() - .5) * .9, ld = bR + (Math.random() - .5) * 45;
        const r = k === 0 ? 4 + Math.random() * 6 : 1.5 + Math.random() * 3.5;
        const cn = mkNode(r, 0); nodes[cn].x = NCX() + Math.cos(la) * ld + (Math.random() - .5) * 22;
        nodes[cn].y = NCY() + Math.sin(la) * ld + (Math.random() - .5) * 22;
        nodes[cn].community = ci + 1; nodes[cn].pColor = pc; cNds.push(cn);
      }
      for (let k = 1; k < cNds.length; k++) {
        mkEdge(cNds[0], cNds[k]);
        if (k > 1 && Math.random() < .38) mkEdge(cNds[k - 1], cNds[k]);
      }
      const cLen = 2 + Math.floor(Math.random() * 3), cAng = bAng + (Math.random() - .5) * .15;
      let prev = rndOf(outerPool);
      for (let k = 0; k < cLen; k++) {
        const prog = (k + 1) / (cLen + 1), cr = 115 + prog * (bR - 115);
        const cn = mkNode(1.2 + Math.random() * 2.3, 0);
        nodes[cn].x = NCX() + Math.cos(cAng) * cr + (Math.random() - .5) * 15;
        nodes[cn].y = NCY() + Math.sin(cAng) * cr + (Math.random() - .5) * 15;
        nodes[cn].community = ci + 1; nodes[cn].pColor = pc; mkEdge(prev, cn); prev = cn;
      }
      mkEdge(prev, cNds[0]);
    }

    // Sort small→large (large on top)
    nodes.sort((a, b) => a.r - b.r);
    const idxOf = new Array(nid);
    nodes.forEach((nd, i) => { idxOf[nd.id] = i; });
    for (let e = 0; e < edges.length; e++) { edges[e][0] = idxOf[edges[e][0]]; edges[e][1] = idxOf[edges[e][1]]; }

    const hubNodes = nodes.filter(nd => nd.hubName);
    const physCellInv = 1 / CFG.REPULSION_RANGE;

    // ── Physics tick ──────────────────────────────────────────────────────────────
    function netTick() {
      const n = nodes.length, cx = frame.ncx, cy = frame.ncy;
      const a = Math.max(alphaSim, CFG.ALPHA_MIN);
      for (let i = 0; i < n; i++) { nodes[i].fx = 0; nodes[i].fy = 0; }
      for (let i = 0; i < n; i++) {
        const nd = nodes[i];
        const g = nd.community === 0 ? CFG.GRAVITY_MAIN * (CFG.GRAVITY_MAIN_BASE + nd.r * CFG.GRAVITY_MAIN_R) : CFG.GRAVITY_PERI;
        nd.fx += (cx - nd.x) * g * a; nd.fy += (cy - nd.y) * g * a;
      }
      const rrs = CFG.REPULSION_RANGE * CFG.REPULSION_RANGE;
      physBuckets.clear();
      for (let i = 0; i < n; i++) {
        const nd = nodes[i];
        const key = ((nd.x * physCellInv) | 0) + ',' + ((nd.y * physCellInv) | 0);
        let bucket = physBuckets.get(key);
        if (!bucket) { bucket = []; physBuckets.set(key, bucket); }
        bucket.push(i);
      }
      for (let i = 0; i < n; i++) {
        const ni = nodes[i];
        const ix = (ni.x * physCellInv) | 0;
        const iy = (ni.y * physCellInv) | 0;
        for (let ox = -1; ox <= 1; ox++) {
          for (let oy = -1; oy <= 1; oy++) {
            const bucket = physBuckets.get((ix + ox) + ',' + (iy + oy));
            if (!bucket) continue;
            for (let t = 0; t < bucket.length; t++) {
              const j = bucket[t];
              if (j <= i) continue;
              const nj = nodes[j];
              const dx = ni.x - nj.x, dy = ni.y - nj.y;
              let dsq = dx * dx + dy * dy;
              if (dsq < 1e-4) dsq = 1e-4;
              const mn = ni.r + nj.r + CFG.COLLISION_GAP;
              const mnSq = mn * mn;
              if (dsq < mnSq) {
                const d = Math.sqrt(dsq), ov = (mn - d) * CFG.COLLISION_RESP;
                const inv = 1 / d, nx = dx * inv, ny = dy * inv;
                ni.x += nx * ov; ni.y += ny * ov;
                nj.x -= nx * ov; nj.y -= ny * ov;
              }
              if (dsq < rrs) {
                const d = Math.sqrt(dsq), str = (ni.r * nj.r * CFG.REPULSION_R_MUL + CFG.REPULSION_BASE) * a;
                const f = str / (dsq * d), fx = dx * f, fy = dy * f;
                ni.fx += fx; ni.fy += fy;
                nj.fx -= fx; nj.fy -= fy;
              }
            }
          }
        }
      }
      // Springs
      for (const [ai, bi] of edges) {
        const na = nodes[ai], nb = nodes[bi], dx = nb.x - na.x, dy = nb.y - na.y;
        const d = Math.sqrt(dx * dx + dy * dy) || .01, rest = CFG.SPRING_REST_BASE + (na.r + nb.r) * CFG.SPRING_REST_R;
        const f = (d - rest) * CFG.SPRING_K * a, fx = dx / d * f, fy = dy / d * f;
        na.fx += fx; na.fy += fy; nb.fx -= fx; nb.fy -= fy;
      }
      for (let i = 0; i < n; i++) {
        const nd = nodes[i];
        nd.vx = (nd.vx + nd.fx) * CFG.DAMPING; nd.vy = (nd.vy + nd.fy) * CFG.DAMPING;
        nd.x += nd.vx; nd.y += nd.vy;
      }
      alphaSim = Math.max(CFG.ALPHA_MIN, alphaSim - CFG.ALPHA_DECAY);
    }

    // ── Draw network (clipped to right of barrier) ─────────────────────────────
    function drawNetwork(fade, at) {
      if (fade <= 0) return;
      const clipL = frame.barrierRight;
      ctx.save();
      ctx.beginPath();
      ctx.rect(clipL, 0, W - clipL, H);
      ctx.clip();
      ctx.globalAlpha = fade;

      for (const [ai, bi, cv] of edges) {
        const na = nodes[ai], nb = nodes[bi];
        const isM = na.community === 0 && nb.community === 0;
        const ea = isM ? CFG.EDGE_MAIN_ALPHA + Math.min(na.r, nb.r) * CFG.EDGE_MAIN_ALPHA_R
          : CFG.EDGE_PERI_ALPHA + Math.min(na.r, nb.r) * CFG.EDGE_PERI_ALPHA_R;
        const ec = (!isM && (na.pColor || nb.pColor)) ? na.pColor || nb.pColor : CYA;
        ctx.strokeStyle = `rgba(${ec.join(',')},${ea})`;
        ctx.lineWidth = isM ? CFG.EDGE_MAIN_W : CFG.EDGE_PERI_W;
        const mx = (na.x + nb.x) * .5, my = (na.y + nb.y) * .5, dx = nb.x - na.x, dy = nb.y - na.y, len = Math.sqrt(dx * dx + dy * dy) || 1;
        ctx.beginPath(); ctx.moveTo(na.x, na.y);
        ctx.quadraticCurveTo(mx - dy / len * cv * len, my + dx / len * cv * len, nb.x, nb.y);
        ctx.stroke();
      }
      // Nodes
      const settled = alphaSim < CFG.BREATHE_THRESH;
      for (const nd of nodes) {
        const c = nd.pColor || CYA;
        const br = settled ? 1 + CFG.BREATHE_AMP * Math.sin(at * CFG.BREATHE_SPEED + nd.phase) : 1;
        const r = nd.r * br;
        if (nd.community === 0 && r > CFG.NODE_GLOW_THRESH) {
          const gr = r * CFG.NODE_GLOW_R;
          const grd = ctx.createRadialGradient(nd.x, nd.y, r * CFG.NODE_GLOW_INNER, nd.x, nd.y, gr);
          grd.addColorStop(0, `rgba(${c.join(',')},${CFG.NODE_GLOW_A_MAIN})`);
          grd.addColorStop(1, `rgba(${c.join(',')},0)`);
          ctx.fillStyle = grd; ctx.beginPath(); ctx.arc(nd.x, nd.y, gr, 0, Math.PI * 2); ctx.fill();
        }
        let bA = nd.community === 0 ? Math.min(CFG.NODE_A_BASE + nd.r * CFG.NODE_A_R, CFG.NODE_A_MAX) : CFG.NODE_A_PERI;
        bA = Math.max(.1, Math.min(1, bA + nd.aOff));
        ctx.fillStyle = `rgba(${c.join(',')},${bA})`;
        ctx.beginPath(); ctx.arc(nd.x, nd.y, r, 0, Math.PI * 2); ctx.fill();
      }
      ctx.restore();

      // Hub pills drawn outside clip (they float above nodes, may slightly overhang)
      const labOp = Math.max(0, Math.min(1, (CFG.NET_FADE_START - alphaSim) / (CFG.NET_FADE_START - CFG.NET_FADE_END))) * fade;
      if (labOp < 0.04) return;
      const hubClip = clipL + 10;
      for (let hi = 0; hi < hubNodes.length; hi++) {
        const nd = hubNodes[hi];
        if (nd.x < hubClip) continue;
        const br = settled ? 1 + CFG.BREATHE_AMP * Math.sin(at * CFG.BREATHE_SPEED + nd.phase) : 1;
        drawLabelPill(nd.hubName, nd.x, nd.y - nd.r * br, labOp, CFG.FONT_KG_LABEL);
      }
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // DATA STREAMS — barrier → network, more and brighter
    // ═══════════════════════════════════════════════════════════════════════════
    function randomStreamY() {
      return GRID_TOP() + Math.random() * GRID_H();
    }

    function resetStream(s) {
      s.y0 = randomStreamY();
      s.tgt = nodes[Math.floor(Math.random() * nodes.length)];
      s.spd = CFG.STREAM_SPEED_MIN + Math.random() * (CFG.STREAM_SPEED_MAX - CFG.STREAM_SPEED_MIN);
      s.t = 0;
    }

    const sData = Array.from({ length: CFG.STREAM_COUNT }, () => ({
      y0: randomStreamY(),
      t: Math.random(),
      spd: CFG.STREAM_SPEED_MIN + Math.random() * (CFG.STREAM_SPEED_MAX - CFG.STREAM_SPEED_MIN),
      tgt: nodes[Math.floor(Math.random() * nodes.length)],
    }));

    function drawStreams(fade) {
      if (fade < 0.05) return;
      const sx0 = frame.barrierRight;
      const [sr, sg, sb] = CYA;
      const streamStroke = `rgba(${sr},${sg},${sb},1)`;

      for (const s of sData) {
        s.t += s.spd;
        if (s.t >= 1) resetStream(s);
        const ex = s.tgt.x, ey = s.tgt.y;
        const sx = sx0, sy = s.y0;
        const c1x = sx + (ex - sx) * 0.38, c1y = sy;
        const c2x = sx + (ex - sx) * 0.65, c2y = ey;
        const op = s.t < .07 ? s.t / .07 : s.t > .93 ? (1 - s.t) / .07 : 1;

        // Path line
        ctx.save();
        ctx.globalAlpha = op * fade * CFG.STREAM_PATH_ALPHA;
        ctx.strokeStyle = streamStroke;
        ctx.lineWidth = CFG.STREAM_PATH_WIDTH;
        ctx.beginPath(); ctx.moveTo(sx, sy);
        ctx.bezierCurveTo(c1x, c1y, c2x, c2y, ex, ey);
        ctx.stroke();

        const pt = bezPt(sx, sy, c1x, c1y, c2x, c2y, ex, ey, s.t);
        ctx.globalAlpha = op * fade * CFG.STREAM_GLOW_ALPHA;
        ctx.fillStyle = streamStroke;
        ctx.beginPath(); ctx.arc(pt.x, pt.y, CFG.STREAM_GLOW_R, 0, Math.PI * 2); ctx.fill();

        ctx.globalAlpha = op * fade * CFG.STREAM_DOT_ALPHA;
        ctx.fillStyle = streamStroke;
        ctx.beginPath(); ctx.arc(pt.x, pt.y, CFG.STREAM_DOT_R, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }
    }

    function syncBarrierPanelStyle() {
      const op = CFG.BARRIER_BG_OPACITY;
      const inv = 1 - op;
      barrierPanelEl.style.borderRadius = CFG.BARRIER_RECT_RADIUS + 'px';
      barrierPanelEl.style.borderColor = CFG.BARRIER_BORDER;
      barrierPanelEl.style.boxShadow = `0 ${CFG.BARRIER_SHADOW_Y}px ${CFG.BARRIER_SHADOW_BLUR}px rgba(0,0,0,${CFG.BARRIER_SHADOW_OP})`;
      barrierPanelEl.style.backdropFilter = `blur(${CFG.BARRIER_BACKDROP_BLUR}px)`;
      barrierPanelEl.style.webkitBackdropFilter = `blur(${CFG.BARRIER_BACKDROP_BLUR}px)`;
      barrierPanelEl.style.background = `linear-gradient(177deg,
        rgba(81,221,247,${op}) 29.73%,
        rgba(255,255,255,${op + inv * 0.08}) 111.04%)`;
      barrierLabelEl.textContent = CFG.BARRIER_LABEL;
      barrierLabelEl.style.right = CFG.BARRIER_LABEL_INSET_X + 'px';
      barrierLabelEl.style.bottom = CFG.BARRIER_LABEL_INSET_Y + 'px';
      barrierLabelEl.style.opacity = String(CFG.BARRIER_LABEL_OP);
    }

    // Z_LAYER.BARRIER — glass panel (HTML) above conveyor squares
    function syncBarrierPanel() {
      const bw = CFG.BARRIER_RECT_W;
      const x = frame.bx - bw * 0.5;
      const h = frame.gBot - frame.gTop;
      barrierPanelEl.style.left = x + 'px';
      barrierPanelEl.style.top = frame.gTop + 'px';
      barrierPanelEl.style.width = bw + 'px';
      barrierPanelEl.style.height = h + 'px';
    }

    function drawBarrierPanel() {
      syncBarrierPanel();
    }

    function drawZoneTitles() {
      drawSectionLabel(CFG.CONVEYOR_ZONE_LABEL, 0);
      drawSectionLabelRight(CFG.KG_ZONE_LABEL, W);
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // ANIMATION LOOP
    // ═══════════════════════════════════════════════════════════════════════════
    let animTime = 0, lastT = performance.now();

    function loop(now) {
      requestAnimationFrame(loop);
      const dt = Math.min((now - lastT) / 1000, 0.05);
      lastT = now; animTime += dt;

      beginFrame();

      const kgReady = animTime >= CFG.KG_BUILD_DELAY_SEC;
      const physicsSettled = alphaSim <= CFG.ALPHA_MIN + CFG.PHYSICS_SETTLED_EPS;
      if (kgReady && !physicsSettled) {
        const ticks = alphaSim > .65 ? 4 : alphaSim > .35 ? 3 : alphaSim > .12 ? 2 : 1;
        for (let t = 0; t < ticks; t++) netTick();
      } else if (!kgReady) {
        alphaSim = 1.0;
      }

      // Clear + background
      ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = DOT_PAT; ctx.fillRect(0, 0, W, H);

      const simFade = Math.max(0, Math.min(1,
        (CFG.NET_FADE_START - alphaSim) / (CFG.NET_FADE_START - CFG.NET_FADE_END)));
      const timeFade = kgReady
        ? Math.min(1, (animTime - CFG.KG_BUILD_DELAY_SEC) / CFG.KG_BUILD_RAMP_SEC)
        : 0;
      const fade = simFade * timeFade;

      // Z_LAYER: BG → NETWORK(1) → STREAMS(2) → CONVEYOR(3) → BARRIER(9) → ZONE_TITLES(10)
      drawNetwork(fade, animTime);
      drawStreams(fade);
      drawGrid(dt);
      drawBarrierPanel();
      drawZoneTitles();
    }

    syncBarrierPanelStyle();
    requestAnimationFrame(loop);

    // ═══════════════════════════════════════════════════════════════════════════
    // RESIZE
    // ═══════════════════════════════════════════════════════════════════════════
    window.addEventListener('resize', () => {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      buildGrid();
      sData.forEach(s => { s.y0 = randomStreamY(); });
      beginFrame();
      syncBarrierPanel();
    });
  </script>
</body>

</html>
