<!DOCTYPE html>
<html lang="en">
<head>
	<title>Protoplanet</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		html, body { overflow: hidden; background: transparent; width: 100%; height: 100%; }
		canvas { display: block; }
	</style>
</head>
<body>

<script type="importmap">
{
	"imports": {
		"three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
		"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
	}
}
</script>

<script type="module">
const THREE = await import('three');
const { OrbitControls } = await import('three/addons/controls/OrbitControls.js');
const { GPUComputationRenderer } = await import('three/addons/misc/GPUComputationRenderer.js');

// ===================== CONFIG =====================
const WIDTH = 64;
const PARTICLES = WIDTH * WIDTH;

const cfg = {
	gravityConstant: 6.0,
	density: 7.018,
	radius: 380,
	height: 8,
	exponent: 0.4,
	maxMass: 15.0,
	velocity: 14.3,
	velocityExponent: 0.08,
	randVelocity: 2.3
};

const initialMaxMassPerParticle = cfg.maxMass * 1024 / PARTICLES;
const MERGE_MASS_THRESHOLD = initialMaxMassPerParticle * 2.5;
const MAX_LINES = 600;
const LINE_MAX_DIST = 250;

// ===================== SHADERS =====================

const computeShaderPosition = `
#define delta ( 1.0 / 60.0 )
void main() {
	vec2 uv = gl_FragCoord.xy / resolution.xy;
	vec4 tmpPos = texture2D( texturePosition, uv );
	vec3 pos = tmpPos.xyz;
	vec4 tmpVel = texture2D( textureVelocity, uv );
	vec3 vel = tmpVel.xyz;
	float mass = tmpVel.w;
	if ( mass == 0.0 ) vel = vec3( 0.0 );
	pos += vel * delta;
	gl_FragColor = vec4( pos, 1.0 );
}
`;

const computeShaderVelocity = `
#define PI 3.141592653589793
#define delta ( 1.0 / 60.0 )
uniform float gravityConstant;
uniform float density;
const float width = resolution.x;
const float height = resolution.y;
float radiusFromMass( float mass ) {
	return pow( ( 3.0 / ( 4.0 * PI ) ) * mass / density, 1.0 / 3.0 );
}
void main() {
	vec2 uv = gl_FragCoord.xy / resolution.xy;
	float idParticle = uv.y * resolution.x + uv.x;
	vec4 tmpPos = texture2D( texturePosition, uv );
	vec3 pos = tmpPos.xyz;
	vec4 tmpVel = texture2D( textureVelocity, uv );
	vec3 vel = tmpVel.xyz;
	float mass = tmpVel.w;
	if ( mass > 0.0 ) {
		float radius = radiusFromMass( mass );
		vec3 acceleration = vec3( 0.0 );
		for ( float y = 0.0; y < height; y++ ) {
			for ( float x = 0.0; x < width; x++ ) {
				vec2 sc = vec2( x + 0.5, y + 0.5 ) / resolution.xy;
				vec3 pos2 = texture2D( texturePosition, sc ).xyz;
				vec4 vt2 = texture2D( textureVelocity, sc );
				vec3 vel2 = vt2.xyz;
				float mass2 = vt2.w;
				float id2 = sc.y * resolution.x + sc.x;
				if ( idParticle == id2 ) continue;
				if ( mass2 == 0.0 ) continue;
				vec3 dPos = pos2 - pos;
				float dist = length( dPos );
				float radius2 = radiusFromMass( mass2 );
				if ( dist == 0.0 ) continue;
				if ( dist < radius + radius2 ) {
					if ( idParticle < id2 ) {
						vel = ( vel * mass + vel2 * mass2 ) / ( mass + mass2 );
						mass += mass2;
						radius = radiusFromMass( mass );
					} else {
						mass = 0.0;
						vel = vec3( 0.0 );
						break;
					}
				}
				float dsq = dist * dist;
				float gf = gravityConstant * mass2 / dsq;
				gf = min( gf, 1000.0 );
				acceleration += gf * normalize( dPos );
			}
			if ( mass == 0.0 ) break;
		}
		vel += delta * acceleration;
	}
	gl_FragColor = vec4( vel, mass );
}
`;

const particleVS = `
#define PI 3.141592653589793
uniform sampler2D texturePosition;
uniform sampler2D textureVelocity;
uniform float cameraConstant;
uniform float density;
uniform float initialMaxMass;
varying vec4 vColor;
varying float vMass;
float radiusFromMass( float mass ) {
	return pow( ( 3.0 / ( 4.0 * PI ) ) * mass / density, 1.0 / 3.0 );
}
void main() {
	vec4 posTemp = texture2D( texturePosition, uv );
	vec3 pos = posTemp.xyz;
	vec4 velTemp = texture2D( textureVelocity, uv );
	float mass = velTemp.w;
	vMass = mass;
	vec3 baseColor = vec3( 0.027, 0.275, 0.380 );
	vec3 mergedColor = vec3( 0.004, 0.863, 0.996 );
	float mf = clamp( ( mass - initialMaxMass ) / ( initialMaxMass * 6.0 ), 0.0, 1.0 );
	vColor = vec4( mix( baseColor, mergedColor, mf ), 1.0 );
	vec4 mvPosition = modelViewMatrix * vec4( pos, 1.0 );
	float radius = radiusFromMass( mass );
	gl_PointSize = mass == 0.0 ? 0.0 : radius * cameraConstant / ( -mvPosition.z );
	gl_Position = projectionMatrix * mvPosition;
}
`;

const particleFS = `
precision highp float;
varying vec4 vColor;
varying float vMass;
void main() {
	if ( vMass == 0.0 ) discard;
	float f = length( gl_PointCoord - vec2( 0.5 ) );
	if ( f > 0.5 ) discard;
	float alpha = 1.0 - smoothstep( 0.15, 0.5, f );
	gl_FragColor = vec4( vColor.rgb, alpha );
}
`;

// ===================== RENDERER =====================

const camera = new THREE.PerspectiveCamera( 75, innerWidth / innerHeight, 5, 15000 );
camera.position.set( 0, 120, 400 );

const scene = new THREE.Scene();

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setClearColor( 0x000000, 0 );
renderer.setPixelRatio( devicePixelRatio );
renderer.setSize( innerWidth, innerHeight );
document.body.appendChild( renderer.domElement );

const controls = new OrbitControls( camera, renderer.domElement );
controls.minDistance = 100;
controls.maxDistance = 1000;
controls.enableDamping = true;

// ===================== GPU COMPUTE =====================

const gpuCompute = new GPUComputationRenderer( WIDTH, WIDTH, renderer );

if ( !renderer.capabilities.isWebGL2 ) {
	gpuCompute.setDataType( THREE.HalfFloatType );
}

const dtPosition = gpuCompute.createTexture();
const dtVelocity = gpuCompute.createTexture();
fillTextures( dtPosition, dtVelocity );

const velocityVar = gpuCompute.addVariable( 'textureVelocity', computeShaderVelocity, dtVelocity );
const positionVar = gpuCompute.addVariable( 'texturePosition', computeShaderPosition, dtPosition );

gpuCompute.setVariableDependencies( velocityVar, [ positionVar, velocityVar ] );
gpuCompute.setVariableDependencies( positionVar, [ positionVar, velocityVar ] );

velocityVar.material.uniforms[ 'gravityConstant' ] = { value: cfg.gravityConstant };
velocityVar.material.uniforms[ 'density' ] = { value: cfg.density };

const gpuErr = gpuCompute.init();
if ( gpuErr !== null ) console.error( gpuErr );

// ===================== PARTICLES =====================

const geo = new THREE.BufferGeometry();
const positions = new Float32Array( PARTICLES * 3 );
const uvs = new Float32Array( PARTICLES * 2 );

let p = 0;
for ( let i = 0; i < PARTICLES; i++ ) {
	positions[ p++ ] = ( Math.random() * 2 - 1 ) * cfg.radius;
	positions[ p++ ] = 0;
	positions[ p++ ] = ( Math.random() * 2 - 1 ) * cfg.radius;
}
p = 0;
for ( let j = 0; j < WIDTH; j++ ) {
	for ( let i = 0; i < WIDTH; i++ ) {
		uvs[ p++ ] = i / ( WIDTH - 1 );
		uvs[ p++ ] = j / ( WIDTH - 1 );
	}
}

geo.setAttribute( 'position', new THREE.BufferAttribute( positions, 3 ) );
geo.setAttribute( 'uv', new THREE.BufferAttribute( uvs, 2 ) );

const pUniforms = {
	texturePosition: { value: null },
	textureVelocity: { value: null },
	cameraConstant: { value: getCameraConstant( camera ) },
	density: { value: cfg.density },
	initialMaxMass: { value: initialMaxMassPerParticle }
};

const pMat = new THREE.ShaderMaterial({
	uniforms: pUniforms,
	vertexShader: particleVS,
	fragmentShader: particleFS,
	transparent: true,
	depthWrite: false,
	blending: THREE.AdditiveBlending
});

const points = new THREE.Points( geo, pMat );
points.matrixAutoUpdate = false;
points.updateMatrix();
scene.add( points );

// ===================== LINES =====================

const linePos = new Float32Array( MAX_LINES * 6 );
const lineGeo = new THREE.BufferGeometry();
lineGeo.setAttribute( 'position', new THREE.BufferAttribute( linePos, 3 ) );
lineGeo.setDrawRange( 0, 0 );

const lineMat = new THREE.LineBasicMaterial({
	color: 0x01DCFE,
	transparent: true,
	opacity: 0.18,
	blending: THREE.AdditiveBlending,
	depthWrite: false
});

const lines = new THREE.LineSegments( lineGeo, lineMat );
scene.add( lines );

// ===================== FUNCTIONS =====================

function fillTextures( texPos, texVel ) {
	const pa = texPos.image.data;
	const va = texVel.image.data;
	const r = cfg.radius, h = cfg.height, exp = cfg.exponent;
	const mm = cfg.maxMass * 1024 / PARTICLES;
	const mv = cfg.velocity, ve = cfg.velocityExponent, rv = cfg.randVelocity;

	for ( let k = 0; k < pa.length; k += 4 ) {
		let x, z, rr;
		do {
			x = Math.random() * 2 - 1;
			z = Math.random() * 2 - 1;
			rr = x * x + z * z;
		} while ( rr > 1 );
		rr = Math.sqrt( rr );
		const rExp = r * Math.pow( rr, exp );
		const vel = mv * Math.pow( rr, ve );
		const vx = vel * z + ( Math.random() * 2 - 1 ) * rv;
		const vy = ( Math.random() * 2 - 1 ) * rv * 0.05;
		const vz = -vel * x + ( Math.random() * 2 - 1 ) * rv;
		x *= rExp;
		z *= rExp;
		const y = ( Math.random() * 2 - 1 ) * h;
		const mass = Math.random() * mm + 1;
		pa[k] = x; pa[k+1] = y; pa[k+2] = z; pa[k+3] = 1;
		va[k] = vx; va[k+1] = vy; va[k+2] = vz; va[k+3] = mass;
	}
}

function getCameraConstant( cam ) {
	return innerHeight / ( Math.tan( THREE.MathUtils.DEG2RAD * 0.5 * cam.fov ) / cam.zoom );
}

function updateLines() {
	const vRT = gpuCompute.getCurrentRenderTarget( velocityVar );
	const pRT = gpuCompute.getCurrentRenderTarget( positionVar );
	const vBuf = new Float32Array( WIDTH * WIDTH * 4 );
	const pBuf = new Float32Array( WIDTH * WIDTH * 4 );
	renderer.readRenderTargetPixels( vRT, 0, 0, WIDTH, WIDTH, vBuf );
	renderer.readRenderTargetPixels( pRT, 0, 0, WIDTH, WIDTH, pBuf );

	const merged = [];
	for ( let i = 0; i < PARTICLES; i++ ) {
		const mass = vBuf[ i * 4 + 3 ];
		if ( mass > MERGE_MASS_THRESHOLD ) {
			merged.push({ x: pBuf[i*4], y: pBuf[i*4+1], z: pBuf[i*4+2], mass });
		}
	}

	const arr = lineGeo.attributes.position.array;
	let idx = 0;
	const maxIdx = MAX_LINES * 6;
	for ( let i = 0; i < merged.length && idx < maxIdx; i++ ) {
		for ( let j = i + 1; j < merged.length && idx < maxIdx; j++ ) {
			const dx = merged[i].x - merged[j].x;
			const dy = merged[i].y - merged[j].y;
			const dz = merged[i].z - merged[j].z;
			const d = Math.sqrt( dx*dx + dy*dy + dz*dz );
			if ( d < LINE_MAX_DIST ) {
				arr[idx++] = merged[i].x; arr[idx++] = merged[i].y; arr[idx++] = merged[i].z;
				arr[idx++] = merged[j].x; arr[idx++] = merged[j].y; arr[idx++] = merged[j].z;
			}
		}
	}
	lineGeo.setDrawRange( 0, idx / 3 );
	lineGeo.attributes.position.needsUpdate = true;
}

// ===================== RESIZE =====================

addEventListener( 'resize', () => {
	camera.aspect = innerWidth / innerHeight;
	camera.updateProjectionMatrix();
	renderer.setSize( innerWidth, innerHeight );
	pUniforms.cameraConstant.value = getCameraConstant( camera );
});

// ===================== ANIMATE =====================

let frame = 0;
function animate() {
	requestAnimationFrame( animate );
	gpuCompute.compute();
	pUniforms.texturePosition.value = gpuCompute.getCurrentRenderTarget( positionVar ).texture;
	pUniforms.textureVelocity.value = gpuCompute.getCurrentRenderTarget( velocityVar ).texture;
	if ( ++frame % 4 === 0 ) updateLines();
	controls.update();
	renderer.render( scene, camera );
}

animate();

</script>
</body>
</html>
