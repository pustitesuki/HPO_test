<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
<title>GTS — Loss Landscape</title>
<style>
* { margin: 0; padding: 0; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script id="vs" type="x-shader/x-vertex">
  uniform float pointSize;
  uniform vec3 focusPos;
  uniform float maxDist;

  varying float vDistToFocus;

  void main() {
    float dx = position.x - focusPos.x;
    float dz = position.z - focusPos.z;
    float dist = sqrt(dx * dx + dz * dz);
    vDistToFocus = clamp(dist / maxDist, 0.0, 1.0);

    vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
    float sizeMult = mix(1.4, 0.75, vDistToFocus);
    gl_PointSize = pointSize * sizeMult * (300.0 / -mvPos.z);
    gl_Position = projectionMatrix * mvPos;
  }
</script>

<script id="fs" type="x-shader/x-fragment">
  uniform vec3 colorNear;
  uniform vec3 colorFar;

  varying float vDistToFocus;

  void main() {
    float d = length(gl_PointCoord - 0.5);
    if (d > 0.5) discard;
    float alpha = smoothstep(0.5, 0.08, d);

    float t = pow(vDistToFocus, 0.55);
    vec3 col = mix(colorNear, colorFar, t);

    float glow = (1.0 - vDistToFocus) * 0.15;
    col += glow;

    gl_FragColor = vec4(col, alpha * 0.55);
  }
</script>

<script>
(() => {
  // ═══════════════════════════════════════════════════════
  //  CONFIG
  // ═══════════════════════════════════════════════════════
  const POINT_SIZE       = 0.7;
  const RING_OUTER       = 15.0;   // outer radius of the ring
  const RING_INNER       = 8.0;    // inner radius (hole)
  const RING_POINTS      = 12000;  // total points in the ring
  const COLOR_NEAR       = [0.0, 0.843, 1.0];     // #00D7FF
  const COLOR_FAR        = [0.075, 0.188, 0.271];  // #133045
  const COLOR_MAX_DIST   = 14.0;
  const CAM_HEIGHT       = 42;

  // Chaos / order
  const CHAOS_AMPLITUDE  = 2.5;
  const ORDER_RADIUS     = 3.0;
  const CHAOS_SPEED      = 1.5;

  // Orbit of order zone
  const ORBIT_SPEED      = 0.8;    // radians per second (speed along ring)
  const ORBIT_RADIUS     = (RING_OUTER + RING_INNER) / 2; // center of ring band

  // Terrain height
  const HEIGHT_SCALE     = 5.0;

  // Trail fade
  const TRAIL_ALPHA      = 0.88;
  // ═══════════════════════════════════════════════════════

  // Renderer — no autoclear for trails
  const renderer = new THREE.WebGLRenderer({ antialias: false, preserveDrawingBuffer: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(devicePixelRatio);
  renderer.setClearColor(0x000000, 1);
  renderer.autoClear = false;
  document.body.appendChild(renderer.domElement);

  // Fade quad
  const fadeScene = new THREE.Scene();
  const fadeCam   = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
  const fadeMat   = new THREE.MeshBasicMaterial({
    color: 0x000000, transparent: true,
    opacity: 1.0 - TRAIL_ALPHA, depthTest: false,
  });
  fadeScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), fadeMat));

  // Main scene
  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 1, 200);
  camera.position.set(0, CAM_HEIGHT, 0);
  camera.lookAt(0, 0, 0);

  // ─── Loss function (for height variation) ──────────────
  function lossFunc(x, z) {
    const g  = 0.6  * Math.exp(-0.15 * ((x-2)**2 + (z-1)**2));
    const l1 = 0.35 * Math.exp(-0.20 * ((x+3)**2 + (z+2)**2));
    const l2 = 0.25 * Math.exp(-0.18 * ((x+1)**2 + (z-4)**2));
    const l3 = 0.30 * Math.exp(-0.12 * ((x-4)**2 + (z+3)**2));
    const s  = 0.15 * Math.sin(x*0.4) * Math.cos(z*0.4);
    const b  = 0.12 * Math.sin(x*0.7+1.2) * Math.cos(z*0.5+0.8)
             + 0.08 * Math.sin(x*1.1-0.5) * Math.sin(z*0.9+1.5);
    return -(g + l1 + l2 + l3) + s + b * 0.6;
  }

  // ─── Distribute points in a ring ───────────────────────
  const total = RING_POINTS;
  const posArr = new Float32Array(total * 3);
  const baseX  = new Float32Array(total);
  const baseY  = new Float32Array(total);
  const baseZ  = new Float32Array(total);

  const rndPhaseX = new Float32Array(total);
  const rndPhaseZ = new Float32Array(total);
  const rndPhaseY = new Float32Array(total);
  const rndAmpX   = new Float32Array(total);
  const rndAmpZ   = new Float32Array(total);
  const rndAmpY   = new Float32Array(total);
  const rndFreqX  = new Float32Array(total);
  const rndFreqZ  = new Float32Array(total);
  const rndFreqY  = new Float32Array(total);

  for (let i = 0; i < total; i++) {
    // uniform distribution in a ring: rejection-free via sqrt
    const angle = Math.random() * Math.PI * 2;
    // uniform area distribution between inner and outer radius
    const r = Math.sqrt(
      RING_INNER * RING_INNER +
      Math.random() * (RING_OUTER * RING_OUTER - RING_INNER * RING_INNER)
    );

    const x = Math.cos(angle) * r;
    const z = Math.sin(angle) * r;
    const y = lossFunc(x * 0.45, z * 0.45) * HEIGHT_SCALE;

    baseX[i] = x;
    baseY[i] = y;
    baseZ[i] = z;

    posArr[i*3]   = x;
    posArr[i*3+1] = y;
    posArr[i*3+2] = z;

    rndPhaseX[i] = Math.random() * Math.PI * 2;
    rndPhaseZ[i] = Math.random() * Math.PI * 2;
    rndPhaseY[i] = Math.random() * Math.PI * 2;
    rndAmpX[i]   = (0.4 + Math.random() * 0.6) * CHAOS_AMPLITUDE;
    rndAmpZ[i]   = (0.4 + Math.random() * 0.6) * CHAOS_AMPLITUDE;
    rndAmpY[i]   = (0.3 + Math.random() * 0.7) * CHAOS_AMPLITUDE * 0.5;
    rndFreqX[i]  = (0.5 + Math.random() * 1.5) * CHAOS_SPEED;
    rndFreqZ[i]  = (0.5 + Math.random() * 1.5) * CHAOS_SPEED;
    rndFreqY[i]  = (0.5 + Math.random() * 1.5) * CHAOS_SPEED * 0.7;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));

  const uniforms = {
    pointSize: { value: POINT_SIZE },
    focusPos:  { value: new THREE.Vector3(0, 0, 0) },
    maxDist:   { value: COLOR_MAX_DIST },
    colorNear: { value: new THREE.Vector3(...COLOR_NEAR) },
    colorFar:  { value: new THREE.Vector3(...COLOR_FAR) },
  };

  const material = new THREE.ShaderMaterial({
    uniforms,
    vertexShader:   document.getElementById('vs').textContent,
    fragmentShader: document.getElementById('fs').textContent,
    transparent: true,
    depthTest: false,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });

  const cloud = new THREE.Points(geo, material);
  scene.add(cloud);

  // ─── Animate ───────────────────────────────────────────
  let t = 0;

  function animate() {
    requestAnimationFrame(animate);
    t += 0.006;

    // Camera: top-down with subtle drift
    camera.position.set(
      Math.sin(t * 0.1) * 1.0,
      CAM_HEIGHT,
      Math.cos(t * 0.1) * 1.0
    );
    camera.lookAt(0, 0, 0);

    // ── Order zone orbits along the ring ──
    const orbitAngle = t * ORBIT_SPEED;
    const focusX = Math.cos(orbitAngle) * ORBIT_RADIUS;
    const focusZ = Math.sin(orbitAngle) * ORBIT_RADIUS;
    const focusY = lossFunc(focusX * 0.45, focusZ * 0.45) * HEIGHT_SCALE;

    uniforms.focusPos.value.set(focusX, focusY, focusZ);

    // ── Per-point chaos/order ──
    const positions = geo.attributes.position.array;

    for (let i = 0; i < total; i++) {
      const bx = baseX[i];
      const by = baseY[i];
      const bz = baseZ[i];

      const dx = bx - focusX;
      const dz = bz - focusZ;
      const dist = Math.sqrt(dx*dx + dz*dz);

      // chaos: 0 near focus, 1 far
      const raw = Math.max(0, (dist - ORDER_RADIUS * 0.25) / (ORDER_RADIUS * 0.75));
      const chaosFactor = Math.min(1, raw * raw);

      // jitter
      const jx = Math.sin(t * rndFreqX[i] + rndPhaseX[i]) * rndAmpX[i]
               + Math.sin(t * rndFreqX[i] * 1.7 + rndPhaseZ[i]) * rndAmpX[i] * 0.3;
      const jz = Math.cos(t * rndFreqZ[i] + rndPhaseZ[i]) * rndAmpZ[i]
               + Math.cos(t * rndFreqZ[i] * 1.3 + rndPhaseX[i]) * rndAmpZ[i] * 0.3;
      const jy = Math.sin(t * rndFreqY[i] + rndPhaseY[i]) * rndAmpY[i];

      positions[i*3]   = bx + jx * chaosFactor;
      positions[i*3+1] = by + jy * chaosFactor;
      positions[i*3+2] = bz + jz * chaosFactor;
    }
    geo.attributes.position.needsUpdate = true;

    // Render with trail
    renderer.render(fadeScene, fadeCam);
    renderer.render(scene, camera);
  }

  animate();

  addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
})();
</script>
</body>
</html>
